
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Order - Ultimate V2</title>
    <style>
        :root {
            --bg: #050507;
            --card-bg: #121216;
            --text: #e0e0e0;
            --accent: #ef5350;
            --border-none: #2a2a2e;
            --border-reverse: #a0a0a8;
            --border-holo: #d4af37;
            --border-ex: #4fc3f7;
            --border-sir: #ff8a65;
            --border-mhr: #b388ff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 20px;
        }
        
        .sticky-controls {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 5, 7, 0.95); backdrop-filter: blur(20px);
            padding: 15px 0; border-bottom: 1px solid #222;
        }

        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .tab-btn {
            background: #1a1a1e; border: 1px solid #333; color: #888;
            padding: 8px 20px; border-radius: 20px; cursor: pointer;
            transition: all 0.3s; font-weight: 600;
        }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .search-sort-bar { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; max-width: 1000px; margin: 0 auto; }
        .search-input { background: #111; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 8px; flex: 1; min-width: 250px; }
        .select-input { background: #111; border: 1px solid #333; color: white; padding: 8px 10px; border-radius: 8px; cursor: pointer; }

        .section-title {
            margin: 40px 0 15px; padding-bottom: 8px; border-bottom: 1px solid #222;
            font-size: 1.3em; color: #fff; display: flex; align-items: center; gap: 10px;
            text-transform: capitalize;
        }
        .section-count { font-size: 0.6em; background: #222; padding: 2px 8px; border-radius: 8px; color: #666; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
        
        .card {
            background: var(--card-bg); border-radius: 10px; padding: 8px;
            text-align: center; position: relative; transition: all 0.35s;
            border: 2px solid var(--border-none); overflow: hidden;
        }
        .card:hover { transform: translateY(-10px); z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .variant-reverse { border-color: var(--border-reverse); }
        .variant-holo { border-color: var(--border-holo); }
        .rarity-ex { border-color: var(--border-ex); }
        .rarity-sir { border-color: var(--border-sir); }
        .rarity-mhr { border-color: var(--border-mhr); }

        .card img { width: 100%; border-radius: 5px; aspect-ratio: 0.73; object-fit: cover; }
        .card.missing img { filter: grayscale(1) brightness(0.3); }
        .card.missing { opacity: 0.7; border-style: dashed; border-color: #222 !important; }

        /* SHEEN SYSTEM - RESTORED & IMPROVED */
        .sheen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 1; opacity: 0; transition: opacity 0.3s;
        }
        .card:not(.missing):hover .sheen { opacity: 1; }

        /* Reverse Holo: Metallic Sweep */
        .sheen-reverse {
            background: linear-gradient(110deg, transparent 40%, rgba(255,255,255,0.4) 50%, transparent 60%);
            background-size: 200% 200%; animation: sweep 3s infinite linear;
        }

        /* Holo Rare: Golden Sweep */
        .sheen-holo {
            background: linear-gradient(135deg, transparent 40%, rgba(255,215,0,0.4) 50%, transparent 60%);
            background-size: 200% 200%; animation: sweep 2.5s infinite linear;
        }

        /* ex / Double Rare: Blue Pulse + Sweep */
        .sheen-ex {
            background: radial-gradient(circle at center, rgba(79,195,247,0.1) 0%, transparent 70%);
        }
        .card:not(.missing):hover .sheen-ex {
            animation: pulse 2s infinite ease-in-out;
        }
        .sheen-ex::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(105deg, transparent 45%, rgba(255,255,255,0.4) 50%, transparent 55%);
            background-size: 200% 200%; animation: sweep 2s infinite linear;
        }

        /* Ultra Rare: Bright White Flash */
        .sheen-ultra {
            background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.7) 50%, transparent 70%);
            background-size: 250% 250%; animation: sweep 1.5s infinite linear;
            mix-blend-mode: overlay;
        }

        /* Illustration Rare: Prismatic */
        .sheen-ir {
            background: linear-gradient(45deg, rgba(255,0,0,0.1), rgba(0,255,0,0.1), rgba(0,0,255,0.1));
            animation: rainbow 5s infinite linear;
        }
        .sheen-ir::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(105deg, transparent 45%, rgba(255,255,255,0.3) 50%, transparent 55%);
            background-size: 200% 200%; animation: sweep 3s infinite linear;
        }

        /* Special Illustration Rare: Cosmic */
        .sheen-sir {
            background: linear-gradient(135deg, rgba(255,0,0,0.2), rgba(0,255,0,0.2), rgba(0,0,255,0.2));
            background-size: 400% 400%; animation: cosmic 4s infinite linear;
        }
        .sheen-sir::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.6) 50%, transparent 60%);
            background-size: 200% 200%; animation: sweep 2s infinite linear;
            mix-blend-mode: color-dodge;
        }

        /* Mega Hyper Rare: Golden Shimmer */
        .sheen-mhr {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 255, 255, 0.3), rgba(255, 215, 0, 0.2));
            background-size: 200% 200%;
        }
        .card:not(.missing):hover .sheen-mhr {
            animation: sweep 2s infinite linear;
        }
        .sheen-mhr::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(105deg, transparent 20%, rgba(255, 255, 255, 0.6) 50%, transparent 80%);
            background-size: 200% 200%; animation: sweep 1.5s infinite linear;
            mix-blend-mode: overlay;
        }

        @keyframes sweep { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
        @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes cosmic { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes spin { 100% { transform: rotate(360deg) scale(2); } }

        .card-name { font-weight: 700; margin-top: 8px; font-size: 0.8em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta { font-size: 0.65em; color: #555; }
        .variant-label { font-size: 0.6em; font-weight: 800; padding: 2px 6px; border-radius: 3px; background: #1a1a1e; color: #777; border: 1px solid #222; }
        .qty { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.85); color: #fff; font-size: 0.65em; padding: 2px 6px; border-radius: 3px; font-weight: bold; z-index: 5; }
    </style>
</head>

 "image": "https://pkmncards.com/wp-content/uploads/me3_en_123_std.jpg", "fallbackImage": "https://images.pokemontcg.io/me03/123.png"}, {"id": 124, "dex_id": 310, "name": "Mega Zygarde ex", "rarity": "Mega Hyper Rare", "rarity_rank": 9, "variant": "Non-Holo", "owned": 0, "image": "https://pkmncards.com/wp-content/uploads/me3_en_124_std.jpg", "fallbackImage": "https://images.pokemontcg.io/me03/124.png"}];
        let currentView = 'collection';

        function setView(view) {
            currentView = view;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + view).classList.add('active');
            refreshUI();
        }

        function refreshUI() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const sortBy = document.getElementById('sortSelect').value;
            
            let filtered = allData;
            if (currentView === 'missing') filtered = allData.filter(d => d.owned === 0);
            else if (currentView === 'trade') filtered = allData.filter(d => d.owned >= 2);

            if (query) {
                filtered = filtered.filter(d => 
                    d.name.toLowerCase().includes(query) || 
                    d.rarity.toLowerCase().includes(query) || 
                    d.id.toString().includes(query) ||
                    d.dex_id.toString().includes(query)
                );
            }

            filtered.sort((a, b) => {
                if (sortBy === 'rarity') return b.rarity_rank - a.rarity_rank || a.id - b.id;
                if (sortBy === 'number') return a.id - b.id;
                if (sortBy === 'pokedex') return a.dex_id - b.dex_id;
                if (sortBy === 'name') return a.name.localeCompare(b.name);
            });

            const container = document.getElementById('content');
            container.innerHTML = "";

            // Grouping logic for segmented titles
            let groups = {};
            filtered.forEach(d => {
                let key = "";
                if (sortBy === 'rarity') key = d.rarity;
                else if (sortBy === 'number') key = "Set Cards";
                else if (sortBy === 'pokedex') key = "Pokédex Order";
                else if (sortBy === 'name') key = d.name.charAt(0).toUpperCase();
                
                if (!groups[key]) groups[key] = [];
                groups[key].push(d);
            });

            // Preserve rarity order when sorting by rarity
            let sortedKeys = Object.keys(groups);
            if (sortBy === 'rarity') {
                const rarityOrder = ['Mega Hyper Rare', 'Special Illustration Rare', 'Illustration Rare', 'Ultra Rare', 'Double Rare', 'Reverse Holo', 'Holo Rare', 'Rare', 'Uncommon', 'Common'];
                sortedKeys.sort((a, b) => rarityOrder.indexOf(a) - rarityOrder.indexOf(b));
            }

            sortedKeys.forEach(key => {
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="section-title">
                        ${key} <span class="section-count">${groups[key].length}</span>
                    </div>
                    <div class="grid">
                        ${groups[key].map(d => `
                            <div class="card ${getRarityBorderClass(d)} ${d.owned === 0 ? 'missing' : ''}">
                                <div class="sheen ${getSheenClass(d)}"></div>
                                <div class="qty">×${d.owned}</div>
                                <img src="${d.image}" onerror="this.src='${d.fallbackImage}'" loading="lazy">
                                <div class="card-name">${d.name}</div>
                                <div class="card-meta">#${d.id} (Dex #${d.dex_id}) · ${d.rarity}</div>
                                <div class="variant-label">${d.variant}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function getRarityCategory(rarity) {
            const r = rarity.toLowerCase();
            if (r.includes('hyper')) return 'mhr';
            if (r.includes('special illustration')) return 'sir';
            if (r.includes('illustration')) return 'ir';
            if (r.includes('ultra rare')) return 'ultra';
            if (r.includes('double rare') || r.includes('ex')) return 'ex';
            return 'standard';
        }

        function getSheenClass(entry) {
            const cat = getRarityCategory(entry.rarity);
            if (cat === 'mhr') return 'sheen-mhr';
            if (cat === 'sir') return 'sheen-sir';
            if (cat === 'ir') return 'sheen-ir';
            if (cat === 'ultra') return 'sheen-ultra';
            if (cat === 'ex') return 'sheen-ex';
            if (entry.variant === 'Holo Rare') return 'sheen-holo';
            if (entry.variant === 'Reverse Holo') return 'sheen-reverse';
            return '';
        }

        function getRarityBorderClass(entry) {
            const cat = getRarityCategory(entry.rarity);
            if (cat !== 'standard') return 'rarity-' + cat;
            if (entry.variant === 'Reverse Holo') return 'variant-reverse';
            if (entry.variant === 'Holo Rare') return 'variant-holo';
            return '';
        }

        refreshUI();
    </script>
