<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Order - Collection Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #050507; --card-bg: #121216; --text: #e0e0e0; --accent: #ef5350;
            --border-none: #2a2a2e; --border-reverse: #a0a0a8; --border-holo: #d4af37;
            --border-ex: #4fc3f7; --border-sir: #ff8a65; --border-mhr: #b388ff;
        }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .sticky-controls { position: sticky; top: 0; z-index: 1000; background: rgba(5, 5, 7, 0.95); backdrop-filter: blur(20px); padding: 15px 0; border-bottom: 1px solid #222; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .tab-btn { background: #1a1a1e; border: 1px solid #333; color: #888; padding: 8px 20px; border-radius: 20px; cursor: pointer; border: 1px solid transparent; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .search-sort-bar { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; max-width: 1000px; margin: 0 auto; }
        .search-input { background: #111; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 8px; flex: 1; }
        .select-input { background: #111; border: 1px solid #333; color: white; padding: 8px 10px; border-radius: 8px; }
        .section-title { margin: 40px 0 15px; padding-bottom: 8px; border-bottom: 1px solid #222; font-size: 1.3em; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 10px; padding: 8px; text-align: center; position: relative; border: 2px solid var(--border-none); overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); z-index: 10; }
        .card.selected { border-color: var(--accent) !important; box-shadow: 0 0 15px var(--accent); }
        .variant-reverse { border-color: var(--border-reverse); }
        .variant-holo { border-color: var(--border-holo); }
        .rarity-ex { border-color: var(--border-ex); }
        .rarity-sir { border-color: var(--border-sir); }
        .rarity-mhr { border-color: var(--border-mhr); }
        .card img { width: 100%; border-radius: 5px; aspect-ratio: 0.73; object-fit: cover; pointer-events: none; }
        .card.missing.shaded img { filter: grayscale(1) brightness(0.3); }
        .card-name { font-weight: 700; margin-top: 8px; font-size: 0.8em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Modal Styles */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:2000; }
        .modal { background: #1a1a1e; padding: 25px; border-radius: 15px; border: 1px solid #333; text-align: center; max-width: 400px; width: 90%; }
        .modal h2 { margin-top: 0; color: var(--accent); }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-give { background: #2e7d32; color: white; }
        .btn-get { background: var(--accent); color: white; }
        .btn-cancel { background: #444; color: white; }

        .price-badge { color: #ffd700; font-weight: bold; }
        .calc-container { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
        .calc-column { flex: 1; min-width: 300px; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; }
        .calc-column h3 { margin-top: 0; font-size: 1.1em; color: var(--accent); border-bottom: 1px solid #222; padding-bottom: 10px; }
        .calc-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #222; font-size: 0.85em; }
        .calc-summary-bar { background: #1a1a20; padding: 20px; border-radius: 12px; border: 2px solid var(--accent); margin: 20px 0; display: flex; align-items: center; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .calc-total-box { text-align: center; }
        .calc-total-box .label { font-size: 0.7em; text-transform: uppercase; color: #888; margin-bottom: 4px; }
        .calc-total-box .value { font-size: 1.5em; font-weight: 800; }
        .calc-diff-box { text-align: center; padding-left: 40px; border-left: 1px solid #333; }
        .calc-diff-box .diff { font-size: 2.2em; font-weight: 900; }
        .calc-diff-box .status { font-size: 0.8em; font-weight: bold; margin-top: 5px; }

        .sheen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 1; opacity: 0; transition: opacity 0.3s; }
        .card:hover .sheen { opacity: 1; }
        .sheen-reverse { background: linear-gradient(110deg, transparent 40%, rgba(255,255,255,0.4) 50%, transparent 60%); background-size: 200% 200%; animation: sweep 3s infinite linear; }
        .sheen-holo { background: linear-gradient(135deg, transparent 40%, rgba(255,215,0,0.4) 50%, transparent 60%); background-size: 200% 200%; animation: sweep 2.5s infinite linear; }
        .sheen-ex { background: radial-gradient(circle at center, rgba(79,195,247,0.1) 0%, transparent 70%); }
        .card:hover .sheen-ex { animation: pulse 2s infinite ease-in-out; }
        .sheen-ex::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(105deg, transparent 45%, rgba(255,255,255,0.4) 50%, transparent 55%); background-size: 200% 200%; animation: sweep 2s infinite linear; }
        .sheen-ultra { background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.7) 50%, transparent 70%); background-size: 250% 250%; animation: sweep 1.5s infinite linear; mix-blend-mode: overlay; }
        .sheen-ir { background: linear-gradient(45deg, rgba(255,0,0,0.1), rgba(0,255,0,0.1), rgba(0,0,255,0.1)); animation: rainbow 5s infinite linear; }
        .sheen-ir::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(105deg, transparent 45%, rgba(255,255,255,0.3) 50%, transparent 55%); background-size: 200% 200%; animation: sweep 3s infinite linear; }
        .sheen-sir { background: linear-gradient(135deg, rgba(255,0,0,0.2), rgba(0,255,0,0.2), rgba(0,0,255,0.2)); background-size: 400% 400%; animation: cosmic 4s infinite linear; }
        .sheen-sir::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.6) 50%, transparent 60%); background-size: 200% 200%; animation: sweep 2s infinite linear; mix-blend-mode: color-dodge; }
        .sheen-mhr { background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 255, 255, 0.3), rgba(255, 215, 0, 0.2)); background-size: 200% 200%; }
        .card:hover .sheen-mhr { animation: sweep 2s infinite linear; }
        .sheen-mhr::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(105deg, transparent 20%, rgba(255, 255, 255, 0.6) 50%, transparent 80%); background-size: 200% 200%; animation: sweep 1.5s infinite linear; mix-blend-mode: overlay; }
        @keyframes sweep { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
        @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes cosmic { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Loading Overlay */
        .loading-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 3000; color: white; 
        }
        .pokeball {
            width: 60px; height: 60px; background: #fff; border: 3px solid #000;
            border-radius: 50%; position: relative; overflow: hidden;
            animation: shake 1.25s cubic-bezier(.36,.07,.19,.97) infinite;
            margin-bottom: 20px;
        }
        .pokeball::before, .pokeball::after { content: ""; position: absolute; }
        .pokeball::before { background: #ef5350; width: 100%; height: 50%; border-bottom: 3px solid #000; }
        .pokeball::after {
            top: calc(50% - 6px); left: calc(50% - 6px); width: 12px; height: 12px;
            background: #fff; border: 3px solid #000; border-radius: 50%; z-index: 10;
        }
        @keyframes shake {
            0% { transform: translate(0, 0) rotate(0); }
            20% { transform: translate(-5px, 0) rotate(-15deg); }
            40% { transform: translate(5px, 0) rotate(15deg); }
            60% { transform: translate(-5px, 0) rotate(-10deg); }
            80% { transform: translate(5px, 0) rotate(10deg); }
            100% { transform: translate(0, 0) rotate(0); }
        }

        /* Logo Styles */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1001;
        }
        .logo-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
            object-fit: cover;
        }
        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            line-height: 1;
        }
        .logo-sub {
            font-size: 0.5em;
            color: #ffd700;
            display: block;
            letter-spacing: 4px;
            margin-top: 2px;
        }

        @media (max-width: 800px) {
            .logo-container { justify-content: center; margin-bottom: 10px; }
            .sticky-controls { padding-top: 10px; }
            .header-top { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="pokeball"></div>
        <div style="font-weight: bold; letter-spacing: 1px;">Loading prices, please wait a moment...</div>
    </div>

    <div class="sticky-controls">
        <div class="header-top" style="display: flex; align-items: center; justify-content: space-between; padding: 0 20px 15px; max-width: 1000px; margin: 0 auto;">
            <div class="logo-container">
                <img src="assets/logo.jpg" class="logo-img" alt="Noble Poketrades">
                <div class="logo-text">
                    Noble
                    <span class="logo-sub">Poketrades</span>
                </div>
            </div>
            <div class="set-switcher" style="display: flex; gap: 10px; align-items: center;">
                <div id="userDisplay" style="font-size: 0.8em; color: #888; display: none;">
                    Hello, <span id="currentUserName" style="color: var(--accent); font-weight: bold;"></span>
                    <button onclick="logout()" style="background: none; border: 1px solid #444; color: #888; border-radius: 4px; padding: 2px 8px; margin-left: 8px; cursor: pointer; font-size: 0.9em;">Logout</button>
                </div>
                <button id="loginBtn" onclick="openLoginModal()" style="background: var(--accent); color: white; border: none; border-radius: 20px; padding: 6px 15px; cursor: pointer; font-weight: bold; font-size: 0.8em;">Login / Sign Up</button>
                <select id="setSelect" class="select-input" onchange="window.changeSet(this.value)" style="border-color: #ffd700; color: #ffd700; font-family: 'Cinzel', serif; font-size: 0.8em; letter-spacing: 1px;">
                    <option value="po">Perfect Order</option>
                    <option value="151">S&V: 151</option>
                </select>
            </div>
        </div>
        <div class="nav-tabs">
            <button class="tab-btn active" id="btn-collection" onclick="switchView('collection')">Collection</button>
            <button class="tab-btn" id="btn-missing" onclick="switchView('missing')">Missing</button>
            <button class="tab-btn" id="btn-trade" onclick="switchView('trade')">Tradeable</button>
            <button class="tab-btn" id="btn-calc" onclick="switchView('calc')">Calculator</button>
            <button class="tab-btn" id="btn-import" onclick="switchView('import')">Import</button>
            <button class="tab-btn" style="background: var(--accent); color: white; border: none; font-weight: bold;" onclick="generateMissingReport()" id="exportBtn">Export Missing</button>
        </div>
        <div class="search-sort-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="Search..." oninput="handleRefresh()">
            <select id="sortSelect" class="select-input" onchange="handleRefresh()">
                <option value="rarity">Rarity</option>
                <option value="number">Number</option>
                <option value="pokedex">Pokédex</option>
                <option value="name">Name</option>
            </select>
            <label style="font-size: 0.8em;"><input type="checkbox" id="shadeToggle" checked onchange="handleRefresh()"> Shade</label>
        </div>
    </div>
    <div id="content"></div>

    <div id="tradeModal" class="modal-overlay">
        <div class="modal">
            <h2 id="modalCardName">Card Name</h2>
            <p id="modalCardDetails" style="font-size: 0.9em; color: #888;"></p>
            
            <div id="qtyControls" style="margin: 20px 0; background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333;">
                <div style="font-size: 0.7em; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;">Collection Quantity</div>
                <div style="display: flex; align-items: center; justify-content: center; gap: 25px;">
                    <button class="tab-btn" style="width: 40px; height: 40px; padding: 0; border-radius: 50%; font-size: 1.2em;" onclick="updateQty(-1)">-</button>
                    <span id="modalQty" style="font-size: 2em; font-weight: 900; min-width: 40px;">0</span>
                    <button class="tab-btn" style="width: 40px; height: 40px; padding: 0; border-radius: 50%; font-size: 1.2em;" onclick="updateQty(1)">+</button>
                </div>
            </div>

            <div class="modal-btns" id="tradeBtns">
                <button class="modal-btn btn-give" onclick="addToTrade('give')">I Give This</button>
                <button class="modal-btn btn-get" onclick="addToTrade('get')">I Get This</button>
            </div>
            <button class="modal-btn btn-cancel" style="width:100%; margin-top:10px;" onclick="closeModal()">Close</button>
        </div>
    </div>

    <div id="authModal" class="modal-overlay">
        <div class="modal">
            <h2 id="authTitle">Login</h2>
            <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                <input type="text" id="authUsername" class="search-input" placeholder="Username" style="width: 100%; box-sizing: border-box;">
                <input type="password" id="authPassword" class="search-input" placeholder="4-Digit PIN" maxlength="4" style="width: 100%; box-sizing: border-box; text-align: center; letter-spacing: 5px; font-size: 1.2em;">
                <div id="authError" style="color: var(--accent); font-size: 0.8em; display: none;"></div>
                <div class="modal-btns">
                    <button class="modal-btn btn-get" id="mainAuthBtn" onclick="handleAuth()">Login</button>
                    <button class="modal-btn btn-cancel" onclick="closeAuthModal()">Cancel</button>
                </div>
                <div style="font-size: 0.8em; color: #888; margin-top: 10px;">
                    <span id="authToggleText">Don't have an account?</span>
                    <a href="javascript:void(0)" onclick="toggleAuthMode()" id="authToggleLink" style="color: var(--accent); text-decoration: none; font-weight: bold; margin-left: 5px;">Sign Up</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="data.js"></script>
    <script src="data-151.js"></script>
    <script>
        const API_URL = 'http://localhost:3001';
        let loggedInUser = localStorage.getItem('por_user') || null;
        let authMode = 'login';

        const currentSet = localStorage.getItem('por_current_set') || 'po';
        if (!localStorage.getItem('por_prices_po') && localStorage.getItem('por_prices')) {
            localStorage.setItem('por_prices_po', localStorage.getItem('por_prices'));
        }
        if (!localStorage.getItem('por_qty_po') && localStorage.getItem('por_qty')) {
            localStorage.setItem('por_qty_po', localStorage.getItem('por_qty'));
        }
        document.addEventListener('DOMContentLoaded', () => { 
            if(document.getElementById('setSelect')) document.getElementById('setSelect').value = currentSet; 
            updateUserUI();
            initData();
        });

        async function initData() {
            const DATA = currentSet === 'po' ? window.CARD_DATA : window.DATA_151;
            let cloudOverrides = null;

            if (loggedInUser) {
                try {
                    const r = await fetch(`${API_URL}/get-data?username=${loggedInUser}`);
                    if (r.ok) {
                        const cloudData = await r.json();
                        cloudOverrides = cloudData[currentSet] || {};
                        // If we got cloud data, sync it to localStorage for immediate UI performance
                        localStorage.setItem('por_qty_' + currentSet, JSON.stringify(cloudOverrides));
                    }
                } catch (e) {
                    console.warn("Cloud data fetch failed", e);
                }
            }

            // source for current UI state
            const currentOverrides = JSON.parse(localStorage.getItem('por_qty_' + currentSet) || '{}');
            
            DATA.forEach(d => { 
                if (currentOverrides[d.uid] !== undefined) {
                    d.owned = currentOverrides[d.uid];
                } else {
                    d.owned = 0;
                }
            });
            window.handleRefresh();
        }

        window.changeSet = function(s) { 
            localStorage.setItem('por_current_set', s); 
            location.reload(); 
        };
        const DATA = currentSet === 'po' ? window.CARD_DATA : window.DATA_151;
        const KEY = '11c6293ca7mshbb68d5707f1a726p1d1b24jsnc63b06003475';
        let view = 'collection', trade = [], want = [], prices = JSON.parse(localStorage.getItem('por_prices_' + currentSet) || '{}');
        const overrides = JSON.parse(localStorage.getItem('por_qty_' + currentSet) || '{}');
        DATA.forEach(d => { if (overrides[d.uid] !== undefined) d.owned = overrides[d.uid]; });

        // Define functions globally so they are ALWAYS available
        window.switchView = async function(v) {
            view = v;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-' + v));
            await window.handleRefresh();
        };

        window.renderCard = function(d, isCalc, shade) {
            const isSel = trade.some(i => i.uid === d.uid) || want.some(i => i.uid === d.uid);
            const p = prices[d.name + d.rarity + d.variant] || ({0:0.25, 1:0.50, 2:1.00, 5:5.00, 6:15.00, 7:20.00, 8:40.00, 9:80.00}[d.rarity_rank] || 1.00);
            const isM = d.owned === 0;
            const s = isM && (shade || view === 'calc');
            return `<div class="card ${getB(d)} ${s ? 'missing shaded' : ''} ${isSel ? 'selected' : ''}" onclick="handleCardClick(${d.uid})">
                    <div class="sheen ${getS(d)}"></div>
                    <div class="qty">×${d.owned}</div>
                    <img src="${d.image}" onerror="this.src='${d.fallbackImage}'" loading="lazy">
                    <div class="card-name">${d.name}</div>
                    <div class="card-price">A$${parseFloat(p).toFixed(2)}</div>
                    <div style="font-size:0.6em;color:#555">#${d.id} · ${d.rarity}</div>
                    <div class="variant-label">${d.variant}</div>
                </div>`;
        };

        async function fetchBulkPrices(cardIds) {
            if (!cardIds.length) return;
            try {
                const prefix = currentSet === 'po' ? 'POR-' : 'sv3pt5-';
                const tcgids = cardIds.map(id => prefix + id).join(',');
                const r = await fetch('https://pokemon-tcg-api.p.rapidapi.com/cards?tcgids=' + encodeURIComponent(tcgids), { 
                    headers: {'x-rapidapi-host': 'pokemon-tcg-api.p.rapidapi.com', 'x-rapidapi-key': KEY}
                });
                if (!r.ok) return;
                const j = await r.json();
                if (j.data) {
                    j.data.forEach(m => {
                        const id = m.tcgid?.replace(prefix, '');
                        const matches = DATA.filter(d => d.id == id);
                        matches.forEach(d => {
                            const k = d.name + d.rarity + d.variant;
                            let eur = m?.prices?.cardmarket?.lowest_near_mint || m?.prices?.cardmarket?.['30d_average'];
                            if (eur) {
                                prices[k] = (parseFloat(eur) * 1.65).toFixed(2);
                            }
                        });
                    });
                    savePrices();
                }
            } catch(e) { console.warn("Bulk fetch failed", e); }
        }

        function savePrices() {
            localStorage.setItem('por_prices_' + currentSet, JSON.stringify(prices));
        }

        window.reevaluatePrices = async function() {
            const btn = event.target;
            btn.innerText = "Processing...";
            btn.disabled = true;

            const filtered = view === 'collection' ? DATA.filter(d => d.owned > 0) : DATA.filter(d => d.owned === 0);
            filtered.forEach(d => delete prices[d.name + d.rarity + d.variant]);
            
            await window.handleRefresh();
            
            btn.innerText = "↻ Re-evaluate Prices";
            btn.disabled = false;
        }

        let isRefreshing = false;
        window.handleRefresh = async function() {
            if (isRefreshing) return;
            isRefreshing = true;

            const loader = document.getElementById('loadingOverlay');
            const query = document.getElementById('searchInput').value.toLowerCase();
            const needsFetch = DATA.some(d => (view === 'collection' ? d.owned > 0 : (view === 'missing' ? d.owned === 0 : false)) && !prices[d.name + d.rarity + d.variant]);
            const showLoader = (view === 'missing' || view === 'collection' || view === 'calc') && (needsFetch || !query);
            
            if (showLoader) {
                loader.style.display = 'flex';
                await new Promise(r => setTimeout(r, 100));
            }

            try {
                const query = document.getElementById('searchInput').value.toLowerCase();
                const sort = document.getElementById('sortSelect').value;
                const shade = document.getElementById('shadeToggle').checked;
                const container = document.getElementById('content');
                
                let isCalc = view === 'calc';

                let filtered = DATA;
                if (view === 'missing') filtered = DATA.filter(d => d.owned === 0);
                else if (view === 'trade') filtered = DATA;
                else if (isCalc) filtered = DATA;

                if (query) filtered = filtered.filter(d => d.name.toLowerCase().includes(query) || d.rarity.toLowerCase().includes(query) || d.id.toString().includes(query));

                filtered.sort((a, b) => {
                    if (sort === 'rarity') return b.rarity_rank - a.rarity_rank || a.id - b.id;
                    if (sort === 'number') return a.id - b.id;
                    if (sort === 'pokedex') return a.dex_id - b.dex_id;
                    return a.name.localeCompare(b.name);
                });

                if (isCalc) {
                    await renderCalcWrapper(filtered);
                    return;
                }

                if (view === 'import') {

        async function getP(d) {
            const k = d.name + d.rarity + d.variant;
            if (prices[k]) return prices[k];
            
            const est = {0:0.25, 1:0.50, 2:1.00, 5:5.00, 6:15.00, 7:20.00, 8:40.00, 9:80.00}[d.rarity_rank] || 1.00;
            
            try {
                const prefix = currentSet === 'po' ? 'POR-' : 'sv3pt5-';
                const tcgid = prefix + d.id;
                const r = await fetch('https://pokemon-tcg-api.p.rapidapi.com/cards?tcgid=' + encodeURIComponent(tcgid), { 
                    headers: {'x-rapidapi-host': 'pokemon-tcg-api.p.rapidapi.com', 'x-rapidapi-key': KEY}
                });
                if (!r.ok) throw new Error(r.status);
                const j = await r.json();
                const m = j.data?.[0];
                let eur = m?.prices?.cardmarket?.lowest_near_mint || m?.prices?.cardmarket?.['30d_average'] || est;
                let aud = (parseFloat(eur) * 1.65).toFixed(2);
                prices[k] = aud;
                savePrices(); 
                return prices[k];
            } catch(e) { 
                return est.toFixed(2); 
            }
        }

        async function updateP() {
            let tt = 0, mt = 0;
            const tL = document.getElementById('tL'), mL = document.getElementById('mL');
            if (!tL || !mL) return;

            tL.innerHTML = trade.length ? "" : '<div style="color:#444; font-size:0.9em; padding:10px;">Select duplicates below</div>';
            mL.innerHTML = want.length ? "" : '<div style="color:#444; font-size:0.9em; padding:10px;">Select missing cards below</div>';

            for (const d of trade) { 
                const p = await getP(d); 
                tt += parseFloat(p); 
                tL.innerHTML += '<div class="calc-item"><span>' + d.name + ' (' + d.variant + ')</span><span class="price-badge">A$' + p + '</span></div>'; 
            }
            for (const d of want) { 
                const p = await getP(d); 
                mt += parseFloat(p); 
                mL.innerHTML += '<div class="calc-item"><span>' + d.name + ' (' + d.variant + ')</span><span class="price-badge">A$' + p + '</span></div>'; 
            }
            
            const diff = (tt - mt).toFixed(2);
            const fD = document.getElementById('fD');
            const fT = document.getElementById('fT');
            
            if (fD) {
                fD.innerText = (diff >= 0 ? '+' : '-') + 'A$' + Math.abs(diff).toFixed(2);
                fD.style.color = diff >= 0 ? '#66bb6a' : '#ef5350';
            }
            
            if (fT) {
                if (trade.length === 0 && want.length === 0) fT.innerText = "Select cards below to trade...";
                else if (diff == 0) fT.innerText = "Even Trade";
                else if (diff > 0) fT.innerText = "You are overpaying";
                else fT.innerText = "You need to add cash";
            }
            
            if (document.getElementById('tT')) document.getElementById('tT').innerText = 'A$' + tt.toFixed(2);
            if (document.getElementById('mT')) document.getElementById('mT').innerText = 'A$' + mt.toFixed(2);
            if (document.getElementById('tradeCount')) document.getElementById('tradeCount').innerText = '×' + trade.length;
            if (document.getElementById('wantCount')) document.getElementById('wantCount').innerText = '×' + want.length;

            document.querySelectorAll('#poolGrid .card').forEach(card => {
                const uidAttr = card.getAttribute('onclick');
                if (uidAttr) {
                    const uid = parseInt(uidAttr.match(/\d+/)[0]);
                    const isSel = trade.some(i => i.uid === uid) || want.some(i => i.uid === uid);
                    card.classList.toggle('selected', isSel);
                }
            });
        }

        function getB(d) {
            const r = d.rarity.toLowerCase();
            if (r.includes('hyper')) return 'rarity-mhr';
            if (r.includes('special')) return 'rarity-sir';
            if (r.includes('ultra')) return 'rarity-ultra';
            if (r.includes('double') || r.includes('ex')) return 'rarity-ex';
            if (d.variant === 'Reverse Holo') return 'variant-reverse';
            if (d.variant === 'Holo Rare') return 'variant-holo';
            return '';
        }

        function getS(d) {
            const r = d.rarity.toLowerCase();
            if (r.includes('hyper')) return 'sheen-mhr';
            if (r.includes('special')) return 'sheen-sir';
            if (r.includes('illustration')) return 'sheen-ir';
            if (r.includes('ultra')) return 'sheen-ultra';
            if (r.includes('double') || r.includes('ex')) return 'sheen-ex';
            if (d.variant === 'Holo Rare') return 'sheen-holo';
            if (d.variant === 'Reverse Holo') return 'sheen-reverse';
            return '';
        }

        window.handleRefresh();
    </script>
</body>
</html>
