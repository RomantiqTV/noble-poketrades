<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Order - Collection Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #050507; --card-bg: #121216; --text: #e0e0e0; --accent: #ef5350;
            --border-none: #2a2a2e; --border-reverse: #a0a0a8; --border-holo: #d4af37;
            --border-ex: #4fc3f7; --border-sir: #ff8a65; --border-mhr: #b388ff;
        }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .sticky-controls { position: sticky; top: 0; z-index: 1000; background: rgba(5, 5, 7, 0.95); backdrop-filter: blur(20px); padding: 15px 0; border-bottom: 1px solid #222; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .tab-btn { background: #1a1a1e; border: 1px solid #333; color: #888; padding: 8px 20px; border-radius: 20px; cursor: pointer; border: 1px solid transparent; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .search-sort-bar { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; max-width: 1000px; margin: 0 auto; }
        .search-input { background: #111; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 8px; flex: 1; }
        .select-input { background: #111; border: 1px solid #333; color: white; padding: 8px 10px; border-radius: 8px; }
        .section-title { margin: 40px 0 15px; padding-bottom: 8px; border-bottom: 1px solid #222; font-size: 1.3em; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 10px; padding: 8px; text-align: center; position: relative; border: 2px solid var(--border-none); overflow: hidden; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .card:hover { transform: translateY(-12px) scale(1.1); z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .card.selected { border-color: var(--accent) !important; box-shadow: 0 0 15px var(--accent); }
        .variant-reverse { border-color: var(--border-reverse); }
        .variant-holo { border-color: var(--border-holo); }
        .rarity-ex { border-color: var(--border-ex); }
        .rarity-sir { border-color: var(--border-sir); }
        .rarity-mhr { border-color: var(--border-mhr); }
        .card img { width: 100%; border-radius: 5px; aspect-ratio: 0.73; object-fit: cover; pointer-events: none; }
        .card.missing.shaded img { filter: grayscale(1) brightness(0.3); }
        .card-name { font-weight: 700; margin-top: 8px; font-size: 0.8em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Modal Styles */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:2000; }
        .modal { background: #1a1a1e; padding: 25px; border-radius: 15px; border: 1px solid #333; text-align: center; max-width: 650px; width: 95%; }
        .modal h2 { margin-top: 0; color: var(--accent); }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-give { background: #2e7d32; color: white; }
        .btn-get { background: var(--accent); color: white; }
        .btn-cancel { background: #444; color: white; }

        .price-badge { color: #ffd700; font-weight: bold; }
        .calc-container { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
        .calc-column { flex: 1; min-width: 300px; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; }
        .calc-column h3 { margin-top: 0; font-size: 1.1em; color: var(--accent); border-bottom: 1px solid #222; padding-bottom: 10px; }
        .calc-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #222; font-size: 0.85em; }
        .calc-summary-bar { background: #1a1a20; padding: 12px 25px; border-radius: 12px; border: 1px solid #333; margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 30px; flex-wrap: wrap; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .calc-total-box { text-align: center; }
        .calc-total-box .label { font-size: 0.65em; text-transform: uppercase; color: #888; margin-bottom: 2px; letter-spacing: 1px; }
        .calc-total-box .value { font-size: 1.3em; font-weight: 800; }
        .calc-total-box .value.collection { color: #4caf50; }
        .calc-total-box .value.missing { color: #ef5350; }
        .calc-diff-box { text-align: center; padding-left: 25px; border-left: 1px solid #333; }
        .calc-diff-box .diff { font-size: 1.8em; font-weight: 900; }

        /* Themes */
        body.theme-light {
            --bg: #f5f7f9; --card-bg: #ffffff; --text: #2c3e50; --accent: #e74c3c;
            --border-none: #dcdde1;
        }
        body.theme-light .sticky-controls { background: rgba(245, 247, 249, 0.95); border-bottom: 1px solid #dcdde1; }
        body.theme-light .logo-text, body.theme-light .section-title, body.theme-light .logo-sub { color: #2c3e50; }
        body.theme-light .tab-btn { background: #fff; border: 1px solid #dcdde1; color: #7f8c8d; }
        body.theme-light .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        body.theme-light .search-input, body.theme-light .select-input { background: #fff; border: 1px solid #dcdde1; color: #2c3e50; }
        body.theme-light .calc-summary-bar { background: #fff; border-color: #dcdde1; }
        body.theme-light .calc-column, body.theme-light .comparison-col { background: #fff; border-color: #dcdde1; }
        body.theme-light .col-header { background: #f8f9fa; border-bottom-color: var(--accent); }
        body.theme-light .comp-card { background: #fff; border-color: #eee; }
        body.theme-light .modal { background: #fff; border-color: #eee; color: #2c3e50; }
        body.theme-light #qtyControls { background: #f8f9fa; border-color: #eee; }

        body.theme-mew-nighttime {
            --bg: transparent; --card-bg: rgba(26, 16, 96, 0.6); --text: #eef2ff; --accent: #ff85a2;
            --border-none: rgba(255, 255, 255, 0.1);
        }
        body.theme-mew-nighttime .sticky-controls { background: rgba(10, 5, 32, 0.85); backdrop-filter: blur(15px); border-bottom-color: rgba(255, 133, 162, 0.2); }
        body.theme-mew-nighttime .tab-btn { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: #94a3b8; }
        body.theme-mew-nighttime .tab-btn.active { background: var(--accent); color: white; }
        body.theme-mew-nighttime .search-input, body.theme-mew-nighttime .select-input { background: rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.1); color: white; }
        body.theme-mew-nighttime .card { background: var(--card-bg); backdrop-filter: blur(5px); border-color: rgba(255,255,255,0.05); }
        body.theme-mew-nighttime .card:hover { border-color: var(--accent); }
        body.theme-mew-nighttime .section-title { color: #cbd5e1; border-bottom-color: rgba(255, 133, 162, 0.3); text-shadow: 0 0 10px rgba(255, 133, 162, 0.3); }

        #scene-background {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; overflow: hidden; pointer-events: none;
            display: none;
        }
        body.theme-mew-nighttime #scene-background { display: block; z-index: -1; }
        body.theme-mew-nighttime .parallax-bg { display: none !important; }
        .scene-layer { position: absolute; width: 100%; height: 100%; left: 0; top: 0; will-change: transform; }
        
        .scene-sky-gradient {
            background: linear-gradient(to bottom, #0a0520 0%, #1a1060 60%, #2e1a80 100%);
            height: 100vh;
            z-index: 10;
        }
        
        /* Extend scenery for long pages */
        body.theme-mew-nighttime {
            background: #0a0520; /* fallback/base */
        }
        
        .scene-layer[id="scene-stars"] { z-index: 12; height: 200vh; }
        .scene-layer[id="scene-mountains"] { z-index: 15; }
        .scene-layer[id="scene-clouds"] { z-index: 18; height: 200vh; }
        .scene-layer[id="scene-forest-far"] { z-index: 20; }
        .scene-layer[id="scene-moon"] { z-index: 25; }
        .scene-layer[id="scene-forest-mid"] { z-index: 30; }
        .scene-layer[id="scene-mew-layer"] { z-index: 35; }
        .scene-layer[id="scene-ground"] { z-index: 50; height: 100vh; }
        
        .scene-mountains {
            position: absolute; bottom: 0; width: 200%; height: 50vh;
            background: url('assets/mountain.png') repeat-x bottom;
            background-size: auto 100%; opacity: 0.4; filter: brightness(0.3) hue-rotate(220deg);
            mix-blend-mode: screen;
        }
        
        .scene-forest-far {
            position: absolute; bottom: 0; width: 200%; height: 55vh;
            background: url('assets/forest-far.png') repeat-x bottom;
            background-size: auto 100%; opacity: 0.6; filter: brightness(0.2) hue-rotate(220deg);
            mix-blend-mode: screen;
        }
        
        .scene-forest-mid {
            position: absolute; bottom: 0; width: 200%; height: 60vh;
            background: url('assets/forest-mid.png') repeat-x bottom;
            background-size: auto 100%; filter: brightness(0.15) hue-rotate(220deg);
            mix-blend-mode: screen;
        }
        
        .scene-ledge-png {
            position: absolute; bottom: 0; width: 200%; height: 35vh;
            background: url('assets/ledge.png') repeat-x bottom;
            background-size: auto 100%; filter: brightness(0.1) hue-rotate(220deg);
            z-index: 55;
            mix-blend-mode: screen;
        }

        .scene-ground-fill {
            position: absolute; bottom: 0; width: 100%; height: 200vh;
            background: #04030a;
            transform: translateY(100%);
            z-index: 45;
        }
        
        .scene-star-particle {
            position: absolute; background: white; border-radius: 50%;
            animation: scene-twinkle var(--d) ease-in-out infinite;
        }
        .scene-star-sparkle {
            position: absolute; fill: white;
            animation: scene-twinkle var(--d) ease-in-out infinite;
        }
        @keyframes scene-twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .scene-mew-container {
            position: absolute; top: 35%; left: 30%; width: 120px;
            animation: scene-mew-drift 12s ease-in-out infinite, scene-mew-bob 6s ease-in-out infinite;
        }
        @keyframes scene-mew-drift {
            0%, 100% { transform: translateX(-80px); }
            50% { transform: translateX(80px); }
        }
        @keyframes scene-mew-bob {
            0%, 100% { top: 35%; }
            50% { top: 40%; }
        }

        .scene-forest-back {
            position: absolute; bottom: 0; width: 200%; height: 60vh;
            background: url('https://img.freepik.com/free-vector/natural-landscape-with-forest-mountains-night_1048-13271.jpg?t=st=1744347434~exp=1744351034~hmac=62f5f1a2a4b88f3f8d8b9e8b7c7d6e5f4a3b2c1d0e9f8a7b6c5d4e3f2a1b0c') repeat-x bottom;
            background-size: auto 100%; opacity: 0.3; filter: grayscale(1) brightness(0.2) contrast(1.5);
            z-index: 15;
        }
        
        .scene-forest-mid {
            position: absolute; bottom: 0; width: 200%; height: 50vh;
            background: url('https://static.vecteezy.com/system/resources/previews/001/215/940/original/night-pine-forest-vector.jpg') repeat-x bottom;
            background-size: auto 100%; opacity: 0.6; filter: brightness(0.1) contrast(2);
            z-index: 35;
        }

        .scene-ground-container {
            position: absolute; bottom: 0; width: 100%; height: 40vh;
            background: linear-gradient(to top, #050507 0%, transparent 100%);
            z-index: 50;
        }
        
        .scene-ledge-png {
            position: absolute; bottom: 0; width: 200%; height: 250px;
            background: url('https://png.pngtree.com/png-vector/20220624/ourmid/pngtree-black-silhouette-mountain-range-rocky-cliff-with-grass-png-image_5348821.png') repeat-x bottom;
            background-size: contain; filter: brightness(0.15);
            z-index: 55;
        }
        
        .scene-pokemon-gif {
            position: absolute; image-rendering: pixelated;
            filter: drop-shadow(0 0 5px rgba(255,133,162,0.3));
        }
        
        .scene-pokemon-idle { animation: scene-pkmn-bob var(--d) ease-in-out infinite; }
        @keyframes scene-pkmn-bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        /* Clouds */
        .scene-cloud {
            position: absolute; background: rgba(255, 255, 255, 0.05);
            border-radius: 50px; filter: blur(20px);
            animation: scene-cloud-drift var(--d) linear infinite;
        }
        @keyframes scene-cloud-drift {
            from { transform: translateX(-200px); }
            to { transform: translateX(100vw); }
        }
        
        .scene-orb {
            position: absolute; background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(200,255,255,0) 70%);
            border-radius: 50%; animation: scene-orb-float 10s linear infinite;
        }
        @keyframes scene-orb-float {
            0% { transform: translateY(0); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-300px); opacity: 0; }
        }

        .scene-shimmer { animation: scene-shimmer-anim 3s ease-in-out infinite; }
        @keyframes scene-shimmer-anim {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 2px rgba(100,255,255,0.3)); }
            50% { filter: brightness(1.3) drop-shadow(0 0 8px rgba(100,255,255,0.6)); }
        }
        body.theme-pokemon::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(255, 182, 193, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 182, 193, 0.1) 0%, transparent 20%);
            z-index: -2;
        }
        .parallax-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1; overflow: hidden;
            display: none;
        }
        body.theme-pokemon .parallax-bg { display: block; }
        .falling-pokemon {
            position: absolute; width: 100px; height: 100px;
            background-size: contain; background-repeat: no-repeat;
            opacity: 1; filter: drop-shadow(0 5px 15px rgba(255,133,162,0.3));
            animation: fall linear infinite;
            z-index: 70;
        }
        @keyframes fall {
            0% { transform: translateY(-420px) rotate(0deg) translateX(0); }
            100% { transform: translateY(110vh) rotate(360deg) translateX(50px); }
        }
        body.theme-pokemon .logo-text { color: #ff85a2; text-shadow: 2px 2px #ffcad4; font-family: 'Cinzel', serif; }
        body.theme-pokemon .logo-sub { color: #ff85a2; text-shadow: 1px 1px #ffcad4; }
        body.theme-pokemon .sticky-controls { background: rgba(255, 240, 243, 0.9); backdrop-filter: blur(10px); border-bottom: 2px solid #ffcad4; box-shadow: 0 4px 15px rgba(255, 133, 162, 0.1); }
        body.theme-pokemon .tab-btn { background: #fff; border-color: #ffcad4; color: #ff85a2; }
        body.theme-pokemon .tab-btn.active { background: #ff85a2; color: #fff; border-color: #ff85a2; font-weight: bold; box-shadow: 0 0 15px rgba(255, 133, 162, 0.3); }
        body.theme-pokemon .section-title { border-bottom: 2px solid #ff85a2; color: #ff85a2; text-transform: uppercase; letter-spacing: 2px; }
        body.theme-pokemon .calc-summary-bar { background: #ffffff; border: 1px solid #ffcad4; color: #4a4a4a; box-shadow: 0 8px 25px rgba(255, 133, 162, 0.1); }
        body.theme-pokemon .card { border-width: 2px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2); }
        body.theme-pokemon .card:hover { transform: translateY(-15px) scale(1.12); box-shadow: 0 15px 35px rgba(255, 133, 162, 0.3); }
        body.theme-pokemon .search-input, body.theme-pokemon .select-input { border: 1px solid #ffcad4; background: #fff; color: #4a4a4a; }
        body.theme-pokemon #loadingOverlay { background: rgba(255, 240, 243, 0.9); }
        body.theme-pokemon .modal { border: 2px solid #ff85a2; background: #fff; }
        body.theme-pokemon .card.missing.shaded img { filter: grayscale(1) brightness(0.6) sepia(1) hue-rotate(-50deg) saturate(1.5); opacity: 0.8; }
        
        /* Star Animations */
        .star {
            position: fixed; background: white;
            pointer-events: none; opacity: 0;
            display: none;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }
        body.theme-pokemon .star { display: block; z-index: 60 !important; }
        .shining-star {
            width: 8px; height: 8px;
            background: white;
            animation: twinkle var(--duration) ease-in-out infinite;
        }
        
        .shooting-star {
            width: 4px; height: 4px;
            background: white;
            box-shadow: 0 0 10px white, 0 0 20px #ff85a2;
            animation: shoot var(--duration) linear infinite;
            clip-path: none;
            border-radius: 50%;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 5px white); }
        }
        
        @keyframes shoot {
            0% { transform: translateX(-100px) translateY(0) rotate(-45deg) scaleX(0); opacity: 0; }
            5% { opacity: 1; transform: translateX(0) translateY(0) rotate(-45deg) scaleX(20); }
            50% { opacity: 1; }
            100% { transform: translateX(120vw) translateY(120vh) rotate(-45deg) scaleX(20); opacity: 0; }
        }

        .theme-dot { width: 20px; height: 20px; border-radius: 50%; display: inline-block; vertical-align: middle; margin-right: 10px; border: 1px solid #444; }
        /* Two-Column Comparison Layout */
        .comparison-layout { 
            display: flex; 
            gap: 20px; 
            margin-top: 10px; 
            height: calc(100vh - 250px); 
            overflow: hidden;
        }
        .comparison-col { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #0a0a0c;
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
        }
        .col-header {
            padding: 15px;
            background: #16161a;
            border-bottom: 2px solid var(--accent);
            text-align: center;
        }
        .scroll-sync-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .comp-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
        }
        .comp-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 5px;
            border: 1px solid #333;
            text-align: center;
            font-size: 0.7em;
            cursor: pointer;
        }
        .comp-card img { width: 100%; border-radius: 4px; aspect-ratio: 0.73; object-fit: cover; }
        .comp-card.missing img { filter: grayscale(1) brightness(0.3); }

        /* Large Preview in Modal */
        .large-preview-container {
            margin-bottom: 15px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            background: #000;
            padding: 20px;
        }
        .large-preview-container img {
            width: 100%;
            max-width: 560px;
            display: block;
            margin: 0 auto;
        }

        .sheen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 1; opacity: 0; transition: opacity 0.3s; }
        .card:hover .sheen { opacity: 1; }
        .sheen-reverse { background: linear-gradient(110deg, transparent 40%, rgba(255,255,255,0.4) 50%, transparent 60%); background-size: 200% 200%; animation: sweep 3s infinite linear; }
        .sheen-holo { background: linear-gradient(135deg, transparent 40%, rgba(255,215,0,0.4) 50%, transparent 60%); background-size: 200% 200%; animation: sweep 2.5s infinite linear; }
        .sheen-ex { background: radial-gradient(circle at center, rgba(79,195,247,0.1) 0%, transparent 70%); }
        .card:hover .sheen-ex { animation: pulse 2s infinite ease-in-out; }
        .sheen-ex::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(105deg, transparent 45%, rgba(255,255,255,0.4) 50%, transparent 55%); background-size: 200% 200%; animation: sweep 2s infinite linear; }
        .sheen-ultra { background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.7) 50%, transparent 70%); background-size: 250% 250%; animation: sweep 1.5s infinite linear; mix-blend-mode: overlay; }
        .sheen-ir { background: linear-gradient(45deg, rgba(255,0,0,0.1), rgba(0,255,0,0.1), rgba(0,0,255,0.1)); animation: rainbow 5s infinite linear; }
        .sheen-ir::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(105deg, transparent 45%, rgba(255,255,255,0.3) 50%, transparent 55%); background-size: 200% 200%; animation: sweep 3s infinite linear; }
        .sheen-sir { background: linear-gradient(135deg, rgba(255,0,0,0.2), rgba(0,255,0,0.2), rgba(0,0,255,0.2)); background-size: 400% 400%; animation: cosmic 4s infinite linear; }
        .sheen-sir::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.6) 50%, transparent 60%); background-size: 200% 200%; animation: sweep 2s infinite linear; mix-blend-mode: color-dodge; }
        .sheen-mhr { background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 255, 255, 0.3), rgba(255, 215, 0, 0.2)); background-size: 200% 200%; }
        .card:hover .sheen-mhr { animation: sweep 2s infinite linear; }
        .sheen-mhr::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(105deg, transparent 20%, rgba(255, 255, 255, 0.6) 50%, transparent 80%); background-size: 200% 200%; animation: sweep 1.5s infinite linear; mix-blend-mode: overlay; }
        @keyframes sweep { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
        @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes cosmic { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Loading Overlay */
        .loading-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 3000; color: white; 
        }
        .pokeball {
            width: 60px; height: 60px; background: #fff; border: 3px solid #000;
            border-radius: 50%; position: relative; overflow: hidden;
            animation: shake 1.25s cubic-bezier(.36,.07,.19,.97) infinite;
            margin-bottom: 20px;
        }
        .pokeball::before, .pokeball::after { content: ""; position: absolute; }
        .pokeball::before { background: #ef5350; width: 100%; height: 50%; border-bottom: 3px solid #000; }
        
        body.theme-pokemon .pokeball::before { background: #ff85a2; border-bottom-color: #ffcad4; }
        body.theme-pokemon .pokeball { border-color: #ffcad4; }
        body.theme-pokemon .pokeball::after { border-color: #ffcad4; }
        .pokeball::after {
            top: calc(50% - 6px); left: calc(50% - 6px); width: 12px; height: 12px;
            background: #fff; border: 3px solid #000; border-radius: 50%; z-index: 10;
        }
        @keyframes shake {
            0% { transform: translate(0, 0) rotate(0); }
            20% { transform: translate(-5px, 0) rotate(-15deg); }
            40% { transform: translate(5px, 0) rotate(15deg); }
            60% { transform: translate(-5px, 0) rotate(-10deg); }
            80% { transform: translate(5px, 0) rotate(10deg); }
            100% { transform: translate(0, 0) rotate(0); }
        }

        /* Logo Styles */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1001;
        }
        .logo-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
            object-fit: cover;
        }
        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            line-height: 1;
        }
        .logo-sub {
            font-size: 0.5em;
            color: #ffd700;
            display: block;
            letter-spacing: 4px;
            margin-top: 2px;
        }

        @media (max-width: 800px) {
            body { padding: 10px; }
            .logo-container { justify-content: center; margin-bottom: 5px; }
            .sticky-controls { padding: 10px 0; }
            .header-top { flex-direction: column; gap: 10px; padding: 0 10px 10px; }
            .set-switcher { width: 100%; justify-content: center; }
            .nav-tabs { flex-direction: column; gap: 8px; align-items: stretch; margin-bottom: 10px; }
            .nav-tabs > div { display: flex; gap: 5px; justify-content: center; }
            .tab-btn { padding: 6px 12px; font-size: 0.8em; flex: 1; text-align: center; }
            
            /* Optimized Grid for Mobile (Max 6 per row) */
            .grid { grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); gap: 4px; }
            .card { padding: 3px; border-width: 1.5px; border-radius: 5px; }
            .card:hover { transform: translateY(-8px) scale(1.8); z-index: 2000; }
            .card-name, .card-price, .variant-label, .qty, .card div[style*="font-size:0.6em"] { display: none !important; }
            .card img { border-radius: 3px; }
            
            .calc-summary-bar { padding: 10px; gap: 15px; }
            .calc-total-box .value { font-size: 1.1em; }
            .search-sort-bar { gap: 8px; }
            .search-input { width: 100%; }
            .comparison-layout { flex-direction: column; height: auto; overflow: visible; }
            .scroll-sync-container { height: 400px; }
            .comp-grid { grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 2px; }
            .comp-card { padding: 2px; font-size: 0; }
            .modal { width: 98%; padding: 15px; }
            .large-preview-container { padding: 10px; }
        }
    </style>
</head>

            <h2 style="font-family: 'Cinzel'; font-size: 1.2em;">Settings</h2>

                <div style="font-size: 0.8em; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">Theme Selection</div>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button class="tab-btn" style="width: 100%; text-align: left; justify-content: flex-start; display: flex; align-items: center;" onclick="setTheme('dark')">
                        <span class="theme-dot" style="background: #050507;"></span> Dark Theme (Default)
                    </button>
                    <button class="tab-btn" style="width: 100%; text-align: left; justify-content: flex-start; display: flex; align-items: center;" onclick="setTheme('light')">
                        <span class="theme-dot" style="background: #f5f7f9;"></span> Light Theme
                    </button>
                    <button class="tab-btn" style="width: 100%; text-align: left; justify-content: flex-start; display: flex; align-items: center;" onclick="setTheme('pokemon')">
                        <span class="theme-dot" style="background: #ff85a2;"></span> Pokémon Theme (Mew/Pink)
                    </button>
                    <button class="tab-btn" style="width: 100%; text-align: left; justify-content: flex-start; display: flex; align-items: center;" onclick="setTheme('mew-nighttime')">
                        <span class="theme-dot" style="background: #0a0520; border-color: #ff85a2;"></span> Mew Nighttime (Animated)
                    </button>

    <script src="data.js"></script>
    <script src="data-151.js"></script>
    <script>
        var partnerCollection = null;
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:3001' 
            : window.location.origin;
        let loggedInUser = localStorage.getItem('por_user') || null;
        let authMode = 'login';

        const currentSet = localStorage.getItem('por_current_set') || 'po';
        if (!localStorage.getItem('por_prices_po') && localStorage.getItem('por_prices')) {
            localStorage.setItem('por_prices_po', localStorage.getItem('por_prices'));
        }
        if (!localStorage.getItem('por_qty_po') && localStorage.getItem('por_qty')) {
            localStorage.setItem('por_qty_po', localStorage.getItem('por_qty'));
        }
        document.addEventListener('DOMContentLoaded', () => { 
            if(document.getElementById('setSelect')) document.getElementById('setSelect').value = currentSet; 
            const savedTheme = localStorage.getItem('por_theme') || 'dark';
            setTheme(savedTheme);
            if (savedTheme === 'pokemon') initPokemonTheme();
            updateUserUI();
            initData();
        });

        function setTheme(theme) {
            document.body.classList.remove('theme-light', 'theme-pokemon', 'theme-mew-nighttime');
            if (theme !== 'dark') {
                document.body.classList.add('theme-' + theme);
            }
            localStorage.setItem('por_theme', theme);
            if (theme === 'pokemon') initPokemonTheme();
            if (theme === 'mew-nighttime') initMewNighttime();
        }

        function initMewNighttime() {
            const starLayer = document.getElementById('scene-stars');
            if (starLayer && !starLayer.children.length) {
                // Increased density for longer page
                for (let i = 0; i < 150; i++) {
                    const isSparkle = Math.random() > 0.7;
                    const el = document.createElementNS("http://www.w3.org/2000/svg", isSparkle ? "svg" : "div");
                    const x = Math.random() * 100;
                    const y = Math.random() * 200; // Extend starfield height
                    const dur = (Math.random() * 3 + 2) + "s";
                    const del = (Math.random() * 10) + "s";

                    if (isSparkle) {
                        el.setAttribute("class", "scene-star-sparkle");
                        el.setAttribute("viewBox", "0 0 20 20");
                        el.style.width = "10px";
                        el.style.height = "10px";
                        el.innerHTML = '<path d="M10 0 L12 8 L20 10 L12 12 L10 20 L8 12 L0 10 L8 8 Z" />';
                    } else {
                        el.className = "scene-star-particle";
                        el.style.width = (Math.random() * 3 + 1) + "px";
                        el.style.height = el.style.width;
                    }
                    el.style.left = x + "%";
                    el.style.top = y + "%";
                    el.style.setProperty("--d", dur);
                    el.style.animationDelay = del;
                    starLayer.appendChild(el);
                }
            }

            const grassGroup = document.getElementById('scene-grass-group');
            if (grassGroup && !grassGroup.children.length) {
                for (let i = 0; i < 40; i++) {
                    const x = Math.random() * 1000;
                    const h = Math.random() * 25 + 15;
                    const rect = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    const shimmer = Math.random() > 0.6 ? " scene-shimmer" : "";
                    rect.setAttribute("class", "scene-grass-tuft" + shimmer);
                    rect.setAttribute("d", `M${x} 320 Q${x + 5} ${320 - h}, ${x + 10} 320`);
                    rect.setAttribute("fill", i % 2 === 0 ? "#1a4d2e" : "#0f2c1a");
                    rect.setAttribute("stroke", "#2d5a3b");
                    rect.setAttribute("stroke-width", "1");
                    grassGroup.appendChild(rect);
                }
            }
            
            const cloudLayer = document.getElementById('scene-clouds');
            if (cloudLayer && !cloudLayer.children.length) {
                for (let i = 0; i < 6; i++) {
                    const cloud = document.createElement('div');
                    cloud.className = 'scene-cloud';
                    cloud.style.width = (Math.random() * 200 + 150) + 'px';
                    cloud.style.height = (Math.random() * 40 + 30) + 'px';
                    cloud.style.top = (Math.random() * 40 + 10) + '%';
                    cloud.style.left = (Math.random() * 100) + '%';
                    cloud.style.setProperty('--d', (Math.random() * 40 + 40) + 's');
                    cloud.style.animationDelay = (Math.random() * -60) + 's';
                    cloudLayer.appendChild(cloud);
                }
            }
        }

        // Parallax Scroll Handler
        let scrollY = 0;
        let ticking = false;

        function updateParallax() {
            const layers = document.querySelectorAll('.scene-layer');
            layers.forEach(layer => {
                const speed = parseFloat(layer.getAttribute('data-speed'));
                const yPos = -(scrollY * speed);
                layer.style.transform = `translateY(${yPos}px)`;
            });
            ticking = false;
        }

        window.addEventListener('scroll', () => {
            scrollY = window.pageYOffset;
            if (!ticking) {
                window.requestAnimationFrame(updateParallax);
                ticking = true;
            }
        });

        function initPokemonTheme() {
            const bg = document.getElementById('parallaxBg');
            if (!bg) return;
            bg.innerHTML = '';
            
            // 1. Twinkling Stars (Behind)
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star shining-star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.setProperty('--duration', (Math.random() * 3 + 1.5) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                
                const starSize = Math.random() * 4 + 3;
                star.style.width = starSize + 'px';
                star.style.height = starSize + 'px';
                bg.appendChild(star);
            }

            // 2. Shooting Stars (Behind)
            for (let i = 0; i < 3; i++) {
                const star = document.createElement('div');
                star.className = 'star shooting-star';
                star.style.left = (Math.random() * 50) + 'vw';
                star.style.top = (Math.random() * 50) + 'vh';
                star.style.setProperty('--duration', (Math.random() * 2 + 3) + 's');
                star.style.animationDelay = (Math.random() * 15) + 's';
                bg.appendChild(star);
            }

            // 3. Falling Cute Pokemon (In Front of Stars)
            const pinkPokemon = [
                'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/151.png', // Mew
                'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/35.png',  // Clefairy
                'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/39.png',  // Jigglypuff
                'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/36.png'   // Clefable
            ];

            for (let i = 0; i < 12; i++) {
                const sprite = document.createElement('div');
                sprite.className = 'falling-pokemon';
                sprite.style.left = Math.random() * 100 + '%';
                sprite.style.top = (Math.random() * -100) + 'px';
                sprite.style.animationDuration = (Math.random() * 10 + 12) + 's';
                sprite.style.animationDelay = (Math.random() * 10) + 's';
                sprite.style.backgroundImage = `url(${pinkPokemon[Math.floor(Math.random() * pinkPokemon.length)]})`;
                
                // Random sizes 1x to 4x (100px to 400px)
                const size = Math.floor(Math.random() * 300 + 100);
                sprite.style.width = size + 'px';
                sprite.style.height = size + 'px';
                
                bg.appendChild(sprite);
            }
        }

        window.addEventListener('scroll', () => {
            if (document.body.classList.contains('theme-pokemon')) {
                const scrolled = window.pageYOffset;
                const bg = document.getElementById('parallaxBg');
                if (bg) bg.style.top = (scrolled * 0.2) + 'px';
            }
        });

        function openSettingsModal() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettingsModal() { document.getElementById('settingsModal').style.display = 'none'; }

        async function initData() {

        async function fetchBulkPrices(cardIds) {
            if (!cardIds.length) return;
            try {
                const prefix = currentSet === 'po' ? 'POR-' : 'sv3pt5-';
                const tcgids = cardIds.map(id => prefix + id).join(',');
                const r = await fetch('https://pokemon-tcg-api.p.rapidapi.com/cards?tcgids=' + encodeURIComponent(tcgids), { 
                    headers: {'x-rapidapi-host': 'pokemon-tcg-api.p.rapidapi.com', 'x-rapidapi-key': KEY}
                });
                if (!r.ok) return;
                const j = await r.json();
                if (j.data) {
                    j.data.forEach(m => {
                        const id = m.tcgid?.replace(prefix, '');
                        const matches = DATA.filter(d => d.id == id);
                        matches.forEach(d => {
                            const k = d.name + d.rarity + d.variant;
                            let eur = m?.prices?.cardmarket?.lowest_near_mint || m?.prices?.cardmarket?.['30d_average'];
                            if (eur) {
                                prices[k] = (parseFloat(eur) * 1.65).toFixed(2);
                            }
                        });
                    });
                    savePrices();
                }
            } catch(e) { console.warn("Bulk fetch failed", e); }
        }

            const btn = event.target;
            btn.innerText = "Processing...";

            const filtered = view === 'collection' ? DATA.filter(d => d.owned > 0) : DATA.filter(d => d.owned === 0);

            await window.handleRefresh();

        let isRefreshing = false;
        window.handleRefresh = async function() {
            if (isRefreshing) return;
            isRefreshing = true;

            const loader = document.getElementById('loadingOverlay');
            const query = document.getElementById('searchInput').value.toLowerCase();
            const needsFetch = DATA.some(d => (view === 'collection' ? d.owned > 0 : (view === 'missing' ? d.owned === 0 : false)) && !prices[d.name + d.rarity + d.variant]);
            const showLoader = (view === 'missing' || view === 'collection' || view === 'calc') && (needsFetch || !query);
            
            if (showLoader) {
                loader.style.display = 'flex';
                await new Promise(r => setTimeout(r, 100));
            }

            try {
                const query = document.getElementById('searchInput').value.toLowerCase();
                const sort = document.getElementById('sortSelect').value;
                const shade = document.getElementById('shadeToggle').checked;
                const container = document.getElementById('content');
                
                let isCalc = view === 'calc';

                let filtered = DATA;
                if (view === 'missing') filtered = DATA.filter(d => d.owned === 0);
                else if (view === 'trade') filtered = DATA;
                else if (isCalc) filtered = DATA;

                if (query) filtered = filtered.filter(d => d.name.toLowerCase().includes(query) || d.rarity.toLowerCase().includes(query) || d.id.toString().includes(query));

                filtered.sort((a, b) => {
                    if (sort === 'rarity') return b.rarity_rank - a.rarity_rank || a.id - b.id;
                    if (sort === 'number') return a.id - b.id;
                    if (sort === 'pokedex') return a.dex_id - b.dex_id;
                    return a.name.localeCompare(b.name);
                });

                if (isCalc) {
                    await renderCalcWrapper(filtered);
                    return;
                }

                if (view === 'import') {
                    renderImport();
                    return;
                }

                // Check for uncached prices in the current view
                if (view === 'missing' || view === 'collection') {
                    const uncachedIds = [...new Set(filtered.filter(d => (view === 'collection' ? d.owned > 0 : (view === 'missing' ? true : false)) && !prices[d.name + d.rarity + d.variant]).map(d => d.id))];
                    if (uncachedIds.length > 0) {
                        for (let i = 0; i < uncachedIds.length; i += 20) {
                            await fetchBulkPrices(uncachedIds.slice(i, i + 20));
                        }
                    }
                }

                let html = "", groups = {};
                
                if (view === 'missing' || view === 'collection') {
                    let totalVal = 0;
                    // For collection, we always show the total of ALL owned cards, not just filtered ones
                    const priceTarget = view === 'collection' ? DATA.filter(d => d.owned > 0) : filtered;
                    for (const d of priceTarget) {
                        const k = d.name + d.rarity + d.variant;
                        const p = prices[k] || ({0:0.25, 1:0.50, 2:1.00, 5:5.00, 6:15.00, 7:20.00, 8:40.00, 9:80.00}[d.rarity_rank] || 1.00);
                        totalVal += parseFloat(p) * (view === 'collection' ? d.owned : 1);
                    }
                    html += `<div class="calc-summary-bar" style="margin-bottom: 20px; flex-direction: column; gap: 12px;">
                                <div class="calc-total-box">
                                    <div class="label">Total ${view === 'collection' ? 'Collection' : 'Missing'} Value (Est. AUD)</div>
                                    <div class="value ${view === 'collection' ? 'collection' : 'missing'}">A$${totalVal.toFixed(2)}</div>
                                    <div style="font-size:0.5em; color:#666; margin-top:5px;">Using bulk market data + rarity estimates</div>
                                </div>
                                <button class="tab-btn" style="background:rgba(0,0,0,0.2); font-size:0.7em; padding: 5px 15px;" onclick="reevaluatePrices()">↻ Re-evaluate Prices</button>
                             </div>`;
                }

                filtered.forEach(d => {
                    let k = sort === 'rarity' ? d.rarity : (sort === 'name' ? d.name[0].toUpperCase() : "Cards");
                    if (!groups[k]) groups[k] = []; groups[k].push(d);
                });

                Object.keys(groups).forEach(k => {
                    html += '<div class="section-title">' + k + ' (' + groups[k].length + ')</div><div class="grid">';
                    html += groups[k].map(d => window.renderCard(d, false, shade)).join('');
                    html += '</div>';
                });
                container.innerHTML = html;
            } finally {
                isRefreshing = false;
                loader.style.display = 'none';
            }
        };

            currentModalCard.owned = Math.max(0, currentModalCard.owned + delta);
            document.getElementById('modalQty').innerText = currentModalCard.owned;
            
            // Local state update
            const localOverrides = JSON.parse(localStorage.getItem('por_qty_' + currentSet) || '{}');

            localStorage.setItem('por_qty_' + currentSet, JSON.stringify(localOverrides));

            if (loggedInUser) {
                try {
                    // Fetch existing data first to merge sets
                    const r = await fetch(`${API_URL}/get-data?username=${loggedInUser}`);

                    if (r.ok) allData = await r.json();

            window.handleRefresh();

        window.handleExcelImport = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            const status = document.getElementById('importStatus');
            status.style.display = 'block';
            status.innerText = "Reading file...";
            status.style.color = "#66bb6a";

            reader.onload = async function(evt) {
                try {
                    const data = new Uint8Array(evt.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    let totalImported = 0;

                    const setMappings = [
                        { name: 'po', sheetKeywords: ['Perfect Order'], data: window.CARD_DATA },
                        { name: '151', sheetKeywords: ['151'], data: window.DATA_151 }
                    ];

                    for (const mapping of setMappings) {
                        const sheetName = workbook.SheetNames.find(s => 
                            mapping.sheetKeywords.some(k => s.toLowerCase().includes(k.toLowerCase()))
                        );

                        if (sheetName) {
                            console.log("Found sheet:", sheetName, "for set:", mapping.name);
                            const sheet = workbook.Sheets[sheetName];
                            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                            const localOverrides = JSON.parse(localStorage.getItem('por_qty_' + mapping.name) || '{}');

                            rows.forEach(row => {
                                const name = row[0];
                                const num = row[2];
                                if (!name || num === undefined) return;

                                // Match cards in this set
                                mapping.data.forEach(card => {
                                    // Match by number and name (allowing for minor differences)
                                    if (card.id == num && (name.toString().toLowerCase().includes(card.name.toLowerCase()))) {
                                        let qty = 0;
                                        if (card.variant === 'Standard' || card.variant === 'Non-Holo') qty = parseInt(row[15]) || 0;
                                        else if (card.variant === 'Reverse Holo') qty = parseInt(row[16]) || 0;
                                        else if (card.variant === 'Holo Rare') qty = parseInt(row[17]) || 0;

                                        if (qty > 0) {
                                            card.owned = qty;
                                            localOverrides[card.uid] = qty;
                                            totalImported++;
                                        }
                                    }
                                });
                            });

                            localStorage.setItem('por_qty_' + mapping.name, JSON.stringify(localOverrides));
                        }
                    }

                    status.innerText = `✅ Success! Imported ${totalImported} cards across detected sets.`;
                    
                    // Sync to cloud if logged in
                    if (loggedInUser) {
                        status.innerText += " Syncing to cloud...";
                        try {
                            const r = await fetch(`${API_URL}/get-data?username=${loggedInUser}`);
                            let allData = {};
                            if (r.ok) allData = await r.json();
                            
                            setMappings.forEach(m => {
                                allData[m.name] = JSON.parse(localStorage.getItem('por_qty_' + m.name) || '{}');
                            });

                            await fetch(`${API_URL}/save-data`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ username: loggedInUser, data: allData })
                            });
                            status.innerText = `✅ Success! Imported ${totalImported} cards and synced to cloud.`;
                        } catch (cloudErr) {
                            console.error("Cloud sync failed during import:", cloudErr);
                            status.innerText += " (Cloud sync failed, data saved locally)";
                        }
                    }

                    setTimeout(() => {
                        window.handleRefresh();
                    }, 1500);

                } catch (err) {
                    console.error("Import error:", err);
                    status.innerText = "❌ Error: Could not parse Excel file. Make sure it's a valid checklist.";
                    status.style.color = "#ef5350";
                }
            };
            reader.onerror = function() {
                status.innerText = "❌ Error: Could not read file.";
                status.style.color = "#ef5350";
            };
            reader.readAsArrayBuffer(file);
        };

        window.generateMissingReport = async function() {
            const btn = document.getElementById('exportBtn');
            const originalText = btn.innerText;
            btn.innerText = "Preparing Assets...";
            btn.disabled = true;

            try {
                const missing = DATA.filter(d => (d.owned || 0) === 0);
                if (missing.length === 0) {
                    alert("No missing cards found!");
                    btn.innerText = originalText;
                    btn.disabled = false;
                    return;
                }

                const toBase64 = async url => {
                    const proxyUrl = `${API_URL}/proxy-image?url=${encodeURIComponent(url)}`;
                    try {
                        const response = await fetch(proxyUrl);
                        if (!response.ok) throw new Error('Proxy fetch failed');
                        const blob = await response.blob();
                        return await new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onloadend = () => resolve(reader.result);
                            reader.onerror = reject;
                            reader.readAsDataURL(blob);
                        });
                    } catch (err) {
                        console.warn("Image proxy failed for:", url, err);
                        // If proxy fails, try direct URL as last resort (may hit CORS)
                        return url;
                    }
                };

                // Fetch missing images and convert to base64
                btn.innerText = "Loading Images...";
                const b64Images = {};
                for (const d of missing) {
                    b64Images[d.uid] = await toBase64(d.image);
                }

                btn.innerText = "Building PDF...";

                const container = document.createElement('div');
                container.id = 'pdf-export-container';
                container.style.cssText = `
                    width: 790px;
                    background: #ffffff;
                    color: #334155;
                    font-family: 'Inter', sans-serif;
                    padding: 40px 0; /* Vertical padding */
                    margin: 0;
                `;
                
                // Add a visible "Generating..." overlay
                const overlay = document.createElement('div');
                overlay.id = 'pdf-overlay';
                overlay.style.cssText = `
                    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                    background: #ffffff; z-index: 99999;
                    display: flex; flex-direction: column; align-items: center; justify-content: center;
                    color: #0c4a6e; font-family: 'Inter', sans-serif;
                `;
                overlay.innerHTML = `
                    <div style="font-size: 2em; font-weight: bold; margin-bottom: 10px;">Generating PDF Report</div>
                    <div style="margin-bottom: 30px; color: #64748b;">Please wait while we stabilize the layout...</div>
                    <div id="pdf-preview-host" style="box-shadow: 0 0 50px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; transform: scale(0.6); transform-origin: top center; overflow: hidden; height: 500px; width: 790px;"></div>
                `;
                document.body.appendChild(overlay);
                document.getElementById('pdf-preview-host').appendChild(container);
                
                // 1. HEADER / COVER (ONE PIECE)
                const header = document.createElement('div');
                header.style.background = 'linear-gradient(135deg, #0c4a6e 0%, #075985 100%)';
                header.style.padding = '60px 40px';
                header.style.textAlign = 'center';
                header.style.color = '#fff';
                header.style.position = 'relative';
                header.style.overflow = 'hidden';
                header.innerHTML = `
                    <div style="position: absolute; top: -50px; right: -50px; width: 200px; height: 200px; background: rgba(56, 189, 248, 0.2); border-radius: 50%;"></div>
                    <img src="assets/logo.jpg" style="width: 120px; border-radius: 50%; border: 4px solid #38bdf8; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
                    <h1 style="font-family: 'Cinzel', serif; font-size: 2.5em; margin: 0; letter-spacing: 3px; color: #38bdf8;">NOBLE POKETRADES</h1>
                    <p style="text-transform: uppercase; letter-spacing: 6px; font-size: 0.9em; margin: 10px 0 30px; opacity: 0.8;">Collection Needs Report</p>
                    <div style="display: flex; justify-content: center; gap: 40px; margin-top: 20px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; backdrop-filter: blur(5px);">
                        <div style="text-align: left;">
                            <div style="font-size: 0.6em; text-transform: uppercase; color: #38bdf8;">Collector</div>
                            <div style="font-weight: bold; font-size: 1.1em;">${loggedInUser || 'Anonymous'}</div>
                        </div>
                        <div style="width: 1px; background: rgba(255,255,255,0.2);"></div>
                        <div style="text-align: left;">
                            <div style="font-size: 0.6em; text-transform: uppercase; color: #38bdf8;">Set</div>
                            <div style="font-weight: bold; font-size: 1.1em;">${currentSet === 'po' ? 'Perfect Order' : '151 Collection'}</div>
                        </div>
                        <div style="width: 1px; background: rgba(255,255,255,0.2);"></div>
                        <div style="text-align: left;">
                            <div style="font-size: 0.6em; text-transform: uppercase; color: #38bdf8;">Missing</div>
                            <div style="font-weight: bold; font-size: 1.1em;">${missing.length} Cards</div>
                        </div>
                    </div>
                `;
                container.appendChild(header);

                // 2. CHECKLIST SECTION
                const sectionHeader = (title) => `
                    <div style="background: #f8fafc; padding: 15px 40px; border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; margin-top: 40px; display: flex; align-items: center; gap: 15px;">
                        <div style="width: 4px; height: 24px; background: #38bdf8; border-radius: 2px;"></div>
                        <h2 style="font-family: 'Cinzel', serif; font-size: 1.2em; color: #0c4a6e; margin: 0; letter-spacing: 1px;">${title}</h2>
                    </div>
                `;

                const listSection = document.createElement('div');
                listSection.style.padding = '0 40px';
                listSection.innerHTML = sectionHeader('Complete Needs Checklist');
                
                const table = document.createElement('table');
                table.style.width = '100%';
                table.style.borderCollapse = 'collapse';
                table.style.marginTop = '20px';
                table.innerHTML = `
                    <thead>
                        <tr style="text-align: left; color: #94a3b8; font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #f1f5f9;">
                            <th style="padding: 10px;">ID</th>
                            <th style="padding: 10px;">Card Name</th>
                            <th style="padding: 10px;">Variant</th>
                            <th style="padding: 10px; text-align: right;">Est. Value</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${missing.sort((a,b) => a.id - b.id).map(d => `
                            <tr style="border-bottom: 1px solid #f8fafc; font-size: 0.85em;">
                                <td style="padding: 12px 10px; color: #94a3b8; font-family: monospace;">#${String(d.id).padStart(3, '0')}</td>
                                <td style="padding: 12px 10px; font-weight: 600; color: #1e293b;">${d.name}</td>
                                <td style="padding: 12px 10px;"><span style="color: #0ea5e9; font-weight: 800; font-size: 0.75em; text-transform: uppercase;">${d.variant}</span></td>
                                <td style="padding: 12px 10px; text-align: right; color: #10b981; font-weight: bold;">A$${prices[d.name + d.rarity + d.variant] || '0.00'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                `;
                listSection.appendChild(table);
                container.appendChild(listSection);

                // 3. VISUAL GALLERY GROUPED BY RARITY
                const galleryHeader = document.createElement('div');
                galleryHeader.className = 'html2pdf__page-break';
                galleryHeader.innerHTML = sectionHeader('Visual Gallery (By Rarity)');
                container.appendChild(galleryHeader);

                const grouped = {};
                missing.forEach(d => {
                    if (!grouped[d.rarity]) grouped[d.rarity] = [];
                    grouped[d.rarity].push(d);
                });

                const sortedRarities = Object.keys(grouped).sort((a, b) => {
                    return (grouped[b][0].rarity_rank || 0) - (grouped[a][0].rarity_rank || 0);
                });

                sortedRarities.forEach(rarity => {
                    const rarityHeader = document.createElement('h3');
                    rarityHeader.style.cssText = `
                        color: #64748b; 
                        font-size: 0.8em; 
                        text-transform: uppercase; 
                        letter-spacing: 2px; 
                        margin: 30px 40px 15px; 
                        border-bottom: 1px dashed #e2e8f0; 
                        padding-bottom: 5px;
                        break-after: avoid;
                    `;
                    rarityHeader.innerHTML = `${rarity} (${grouped[rarity].length})`;
                    container.appendChild(rarityHeader);
                    
                    const cards = grouped[rarity];
                    for (let i = 0; i < cards.length; i += 3) {
                        const rowCards = cards.slice(i, i + 3);
                        const row = document.createElement('div');
                        row.style.cssText = `
                            display: flex;
                            gap: 20px;
                            padding: 0 40px;
                            margin-bottom: 20px;
                            break-inside: avoid;
                            page-break-inside: avoid;
                        `;
                        
                        rowCards.forEach(d => {
                            const b64 = b64Images[d.uid];
                            const item = document.createElement('div');
                            item.style.cssText = `
                                flex: 1;
                                background: #fff;
                                padding: 12px;
                                border-radius: 12px;
                                border: 1px solid #f1f5f9;
                                text-align: center;
                                min-width: 0;
                            `;
                            item.innerHTML = `
                                <img src="${b64 || 'assets/placeholder.jpg'}" style="width: 140px; height: auto; display: block; margin: 0 auto 8px; border-radius: 6px;">
                                <div style="font-size: 0.75em; font-weight: bold; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${d.name}</div>
                                <div style="font-size: 0.6em; color: #0ea5e9; font-weight: 800; text-transform: uppercase;">${d.variant}</div>
                            `;
                            row.appendChild(item);
                        });

                        // Spacer for rows with < 3 cards to keep layout consistent
                        for (let j = rowCards.length; j < 3; j++) {
                            const spacer = document.createElement('div');
                            spacer.style.flex = '1';
                            row.appendChild(spacer);
                        }

                        container.appendChild(row);
                    }
                });

                // FOOTER
                const footer = document.createElement('div');
                footer.style.textAlign = 'center';
                footer.style.padding = '40px';
                footer.style.background = '#f8fafc';
                footer.style.color = '#94a3b8';
                footer.style.fontSize = '0.7em';
                footer.style.borderTop = '1px solid #e2e8f0';
                footer.innerHTML = `
                    <p style="margin: 0;">Generated by Noble Poketrades &bull; ${new Date().toLocaleDateString()}</p>
                    <p style="margin: 5px 0;">www.noble-poketrades.onrender.com</p>
                `;
                container.appendChild(footer);

                const opt = {
                    margin: [40, 0, 50, 0], // Top, Right, Bottom, Left in px
                    filename: `Noble_Needs_${currentSet}_${new Date().toISOString().slice(0,10)}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { 
                        scale: 2, 
                        useCORS: true, 
                        backgroundColor: '#ffffff',
                        width: 790,
                        scrollY: 0,
                        scrollX: 0
                    },
                    jsPDF: { unit: 'px', format: [790, 1120], hotfixes: ['px_scaling'] },
                    pagebreak: { mode: ['css', 'legacy'] }
                };

                // Added small delay to ensure DOM is fully painted before capture
                await new Promise(r => setTimeout(r, 2000));
                
                // Using the most basic, stable call pattern for html2pdf
                const pdf = html2pdf().from(container).set(opt);
                
                // Add Page Numbers using jsPDF's internal API
                await pdf.toPdf().get('pdf').then(function (pdf) {
                    const totalPages = pdf.internal.getNumberOfPages();
                    for (let i = 1; i <= totalPages; i++) {
                        pdf.setPage(i);
                        pdf.setFontSize(10);
                        pdf.setTextColor(150);
                        pdf.text('Page ' + i + ' of ' + totalPages, 730, 1100, { align: 'right' });
                    }
                }).save();
                
                document.body.removeChild(overlay);

            } catch (err) {
                console.error(err);
                alert("Report failed to generate. Check console.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        };

        window.closeModal = function() {
            document.getElementById('tradeModal').style.display = 'none';
        }

        window.addToTrade = async function(type) {
            if (!currentModalCard) return;
            
            const added = (type === 'give') ? toggle(currentModalCard, trade) : toggle(currentModalCard, want);
            if (added) {
                // Force a fresh price fetch when adding to a trade
                delete prices[currentModalCard.name + currentModalCard.rarity + currentModalCard.variant];
            }
            
            if (view !== 'calc') {
                window.switchView('calc');
            } else {
                await window.handleRefresh();
            }
            closeModal();
        }

        function toggle(d, l) {
            const i = l.findIndex(x => x.uid === d.uid);
            if (i > -1) { l.splice(i, 1); return false; } 
            else { l.push(d); return true; }
        }

        async function getP(d) {
            const k = d.name + d.rarity + d.variant;
            if (prices[k]) return prices[k];
            
            const est = {0:0.25, 1:0.50, 2:1.00, 5:5.00, 6:15.00, 7:20.00, 8:40.00, 9:80.00}[d.rarity_rank] || 1.00;
            
            try {
                const prefix = currentSet === 'po' ? 'POR-' : 'sv3pt5-';
                const tcgid = prefix + d.id;
                const r = await fetch('https://pokemon-tcg-api.p.rapidapi.com/cards?tcgid=' + encodeURIComponent(tcgid), { 
                    headers: {'x-rapidapi-host': 'pokemon-tcg-api.p.rapidapi.com', 'x-rapidapi-key': KEY}
                });
                if (!r.ok) throw new Error(r.status);
                const j = await r.json();
                const m = j.data?.[0];
                let eur = m?.prices?.cardmarket?.lowest_near_mint || m?.prices?.cardmarket?.['30d_average'] || est;
                let aud = (parseFloat(eur) * 1.65).toFixed(2);
                prices[k] = aud;
                savePrices(); 
                return prices[k];
            } catch(e) { 
                return est.toFixed(2); 
            }
        }

        async function updateP() {
            let tt = 0, mt = 0;
            
            for (const d of trade) { 
                const p = await getP(d); 
                tt += parseFloat(p); 
            }
            for (const d of want) { 
                const p = await getP(d); 
                mt += parseFloat(p); 
            }
            
            const diff = (tt - mt).toFixed(2);
            const fD = document.getElementById('fD');
            
            if (fD) {
                fD.innerText = (diff >= 0 ? '+' : '-') + 'A$' + Math.abs(diff).toFixed(2);
                fD.style.color = diff >= 0 ? '#66bb6a' : '#ef5350';
            }
            
            if (document.getElementById('tT')) document.getElementById('tT').innerText = 'A$' + tt.toFixed(2);
            if (document.getElementById('mT')) document.getElementById('mT').innerText = 'A$' + mt.toFixed(2);
            if (document.getElementById('tradeCount')) document.getElementById('tradeCount').innerText = trade.length;
            if (document.getElementById('wantCount')) document.getElementById('wantCount').innerText = want.length;
        }

        function getB(d) {
            const r = d.rarity.toLowerCase();
            if (r.includes('hyper')) return 'rarity-mhr';
            if (r.includes('special')) return 'rarity-sir';
            if (r.includes('ultra')) return 'rarity-ultra';
            if (r.includes('double') || r.includes('ex')) return 'rarity-ex';
            if (d.variant === 'Reverse Holo') return 'variant-reverse';
            if (d.variant === 'Holo Rare') return 'variant-holo';
            return '';
        }

        function getS(d) {
            const r = d.rarity.toLowerCase();
            if (r.includes('hyper')) return 'sheen-mhr';
            if (r.includes('special')) return 'sheen-sir';
            if (r.includes('illustration')) return 'sheen-ir';
            if (r.includes('ultra')) return 'sheen-ultra';
            if (r.includes('double') || r.includes('ex')) return 'sheen-ex';
            if (d.variant === 'Holo Rare') return 'sheen-holo';
            if (d.variant === 'Reverse Holo') return 'sheen-reverse';
            return '';
        }

        window.handleRefresh();
    </script>
