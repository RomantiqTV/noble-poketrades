<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Order - Collection Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #050507; --card-bg: #121216; --text: #e0e0e0; --accent: #ef5350;
            --border-none: #2a2a2e; --border-reverse: #a0a0a8; --border-holo: #d4af37;
            --border-ex: #4fc3f7; --border-sir: #ff8a65; --border-mhr: #b388ff;
        }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .sticky-controls { position: sticky; top: 0; z-index: 1000; background: rgba(5, 5, 7, 0.95); backdrop-filter: blur(20px); padding: 15px 20px; border-bottom: 1px solid #222; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .tab-btn { background: #1a1a1e; border: 1px solid #333; color: #888; padding: 8px 20px; border-radius: 20px; cursor: pointer; border: 1px solid transparent; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .search-sort-bar { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; max-width: 1000px; margin: 0 auto; }
        .search-input { background: #111; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 8px; flex: 1; }
        .select-input { background: #111; border: 1px solid #333; color: white; padding: 8px 10px; border-radius: 8px; }
        .section-title { margin: 40px 0 15px; padding-bottom: 8px; border-bottom: 1px solid #222; font-size: 1.3em; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 10px; padding: 8px; text-align: center; position: relative; border: 2px solid var(--border-none); overflow: hidden; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .card:hover { transform: translateY(-12px) scale(1.1); z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .card.selected { border-color: var(--accent) !important; box-shadow: 0 0 15px var(--accent); }
        .variant-reverse { border-color: var(--border-reverse); }
        .variant-holo { border-color: var(--border-holo); }
        .rarity-ex { border-color: var(--border-ex); }
        .rarity-sir { border-color: var(--border-sir); }
        .rarity-mhr { border-color: var(--border-mhr); }
        .card img { width: 100%; border-radius: 5px; aspect-ratio: 0.73; object-fit: cover; pointer-events: none; }
        .card.missing.shaded img { filter: grayscale(1) brightness(0.3); }
        .card-name { font-weight: 700; margin-top: 8px; font-size: 0.8em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Modal Styles */
        .modal-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(12px);
            display:none; justify-content:center; align-items:center; z-index:2000; 
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal { 
            background: rgba(26, 26, 30, 0.4); 
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px; 
            border-radius: 24px; 
            text-align: center; 
            max-width: 500px; 
            width: 90%; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: #fff;
        }
        .modal h2 { margin-top: 0; color: var(--accent); font-family: 'Cinzel', serif; letter-spacing: 1px; }
        .modal-btns { display: flex; gap: 12px; margin-top: 24px; }
        .modal-btn { 
            flex: 1; padding: 14px; border-radius: 12px; border: none; 
            cursor: pointer; font-weight: bold; transition: all 0.2s;
            font-size: 0.9em;
        }
        .btn-give { background: #2e7d32; color: white; box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2); }
        .btn-get { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(239, 83, 80, 0.2); }
        .btn-cancel { background: rgba(255,255,255,0.05); color: #888; border: 1px solid rgba(255,255,255,0.1); }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); color: #fff; }

        #qtyControls { 
            margin-top: 20px; 
            background: rgba(255, 255, 255, 0.03); 
            padding: 20px; 
            border-radius: 18px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        /* Glassy Preview in Modal */
        .large-preview-container {
            margin-bottom: 25px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            padding: 10px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        .large-preview-container::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .large-preview-container img {
            width: 100%;
            max-width: 320px;
            display: block;
            margin: 0 auto;
            border-radius: 12px;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.5));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .large-preview-container:hover img { transform: scale(1.03); }

        .price-badge { color: #ffd700; font-weight: bold; }
        .calc-container { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
        .calc-column { flex: 1; min-width: 300px; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; }
        .calc-column h3 { margin-top: 0; font-size: 1.1em; color: var(--accent); border-bottom: 1px solid #222; padding-bottom: 10px; }
        .calc-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #222; font-size: 0.85em; }
        .calc-summary-bar { 
            background: #1a1a20; 
            padding: 12px 25px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            margin: 15px auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 30px; 
            flex-wrap: wrap; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: fit-content;
            min-width: 300px;
        }
        .calc-summary-container {
            text-align: center;
            width: 100%;
        }
        .calc-total-box { text-align: center; }
        .calc-total-box .label { font-size: 0.65em; text-transform: uppercase; color: #888; margin-bottom: 2px; letter-spacing: 1px; }
        .calc-total-box .value { font-size: 1.3em; font-weight: 800; }
        .calc-total-box .value.collection { color: #4caf50; }
        .calc-total-box .value.missing { color: #ef5350; }
        .calc-diff-box { text-align: center; padding-left: 25px; border-left: 1px solid #333; }
        .calc-diff-box .diff { font-size: 1.8em; font-weight: 900; }

        /* Themes */
        body.theme-light {
            --bg: #f5f7f9; --card-bg: #ffffff; --text: #2c3e50; --accent: #e74c3c;
            --border-none: #dcdde1;
        }
        body.theme-light .sticky-controls { background: rgba(245, 247, 249, 0.95); border-bottom: 1px solid #dcdde1; }
        body.theme-light .logo-text, body.theme-light .section-title, body.theme-light .logo-sub { color: #2c3e50; }
        body.theme-light .tab-btn { background: #fff; border: 1px solid #dcdde1; color: #7f8c8d; }
        body.theme-light .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        body.theme-light .search-input, body.theme-light .select-input { background: #fff; border: 1px solid #dcdde1; color: #2c3e50; }
        body.theme-light .calc-summary-bar { background: #fff; border-color: #dcdde1; }
        body.theme-light .calc-column, body.theme-light .comparison-col { background: #fff; border-color: #dcdde1; }
        body.theme-light .col-header { background: #f8f9fa; border-bottom-color: var(--accent); }
        body.theme-light .comp-card { background: #fff; border-color: #eee; }
        body.theme-light .modal { background: #fff; border-color: #eee; color: #2c3e50; }
        body.theme-light #qtyControls { background: #f8f9fa; border-color: #eee; }

        body.theme-articuno-ice {
            --bg: transparent; --card-bg: rgba(200, 230, 255, 0.2); --text: #f0f9ff; --accent: #38bdf8;
            --border-none: rgba(255, 255, 255, 0.1);
        }
        body.theme-articuno-ice .sticky-controls { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border-bottom-color: rgba(56, 189, 248, 0.2); }
        body.theme-articuno-ice .tab-btn { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: #bae6fd; }
        body.theme-articuno-ice .tab-btn.active { background: var(--accent); color: white; }
        body.theme-articuno-ice .search-input, body.theme-articuno-ice .select-input { background: rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.1); color: white; }
        body.theme-articuno-ice .card { background: var(--card-bg); backdrop-filter: blur(10px); border-color: rgba(255,255,255,0.1); }
        body.theme-articuno-ice .card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        body.theme-articuno-ice .section-title { color: #f0f9ff; border-bottom-color: rgba(56, 189, 248, 0.3); text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }

        body.theme-mew-nighttime {
            --bg: transparent; --card-bg: rgba(26, 16, 96, 0.4); --text: #eef2ff; --accent: #ff85a2;
            --border-none: rgba(255, 255, 255, 0.1);
        }
        body.theme-mew-nighttime .sticky-controls { background: rgba(10, 5, 32, 0.85); backdrop-filter: blur(15px); border-bottom-color: rgba(255, 133, 162, 0.2); }
        body.theme-mew-nighttime .tab-btn { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: #94a3b8; }
        body.theme-mew-nighttime .tab-btn.active { background: var(--accent); color: white; }
        body.theme-mew-nighttime .search-input, body.theme-mew-nighttime .select-input { background: rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.1); color: white; }
        body.theme-mew-nighttime .card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        body.theme-mew-nighttime .card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(255,133,162,0.3); }
        body.theme-mew-nighttime .section-title { color: #cbd5e1; border-bottom-color: rgba(255, 133, 162, 0.3); text-shadow: 0 0 10px rgba(255, 133, 162, 0.3); }

        #ice-background {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; overflow: hidden; pointer-events: none;
            display: none;
            background: #1d6292;
        }
        body.theme-articuno-ice #ice-background { display: block; z-index: -1; }
        
        .ice-layer { 
            position: absolute; width: 100%; height: 100vh; left: 0; top: 0; 
            will-change: transform; background-position: center bottom; background-repeat: no-repeat; background-size: 100% auto;
        }

        .ice-sky { 
            background-image: url('assets/parallax/Iceberg/1-Sky.png'); 
            z-index: 5; 
            background-size: 100% auto; 
            background-position: center top 14vh; 
            background-repeat: no-repeat !important;
        }
        .ice-water-back { background-image: url('assets/parallax/Iceberg/0-water.png'); z-index: 10; opacity: 0.8; background-position: center bottom -23vh; }
        .ice-reflex-back { background-image: url('assets/parallax/Iceberg/2-2-water-reflex-back.png'); z-index: 12; mix-blend-mode: screen; opacity: 0.4; background-position: center bottom 19vh; }
        .ice-mountain { background-image: url('assets/parallax/Iceberg/3-mountains.png'); z-index: 15; opacity: 1; background-position: center bottom 20vh; }
        .ice-cloud { background-image: url('assets/parallax/Iceberg/2-cloud.png'); z-index: 20; opacity: 1; background-position: center bottom 33vh; }
        .ice-iceberg-reflex { background-image: url('assets/parallax/Iceberg/4-icebergreflex.png'); z-index: 30; mix-blend-mode: screen; background-position: center bottom 15vh; }
        .ice-iceberg { background-image: url('assets/parallax/Iceberg/5-iceberg.png'); z-index: 40; background-position: center bottom 15vh; }
        .ice-reflex-front { background-image: url('assets/parallax/Iceberg/2-1-water-reflex.png'); z-index: 45; mix-blend-mode: screen; opacity: 0.5; background-position: center bottom 15vh; }

        .ice-ground-fill {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 1000vh;
            background: #1d6292; transform: translateY(100%); z-index: 45;
        }

        .articuno-container {
            position: absolute; top: 25%; left: 65%; width: 150px;
            animation: ice-drift 15s ease-in-out infinite, ice-bob 8s ease-in-out infinite;
            z-index: 35;
        }
        @keyframes ice-drift { 0%, 100% { transform: translateX(-100px); } 50% { transform: translateX(100px); } }
        @keyframes ice-bob { 0%, 100% { top: 25%; } 50% { top: 32%; } }
        
        .ice-pokemon-gif { position: absolute; filter: drop-shadow(0 0 10px rgba(56,189,248,0.4)); }

        #scene-background {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; overflow: hidden; pointer-events: none;
            display: none;
            background: #04030a; /* Ensure a base color matches the deep ocean */
        }
        body.theme-mew-nighttime #scene-background { display: block; z-index: -1; }
        body.theme-mew-nighttime .parallax-bg { display: none !important; }
        
        /* Set base height to fill screen and center the parallax focus */
        .scene-layer { 
            position: absolute; 
            width: 100%; 
            height: 100vh; 
            left: 0; 
            top: 0; 
            will-change: transform; 
            background-position: bottom; 
            background-repeat: no-repeat;
        }
        
        /* Ocean Parallax System (Layers 0-6) */
        .scene-layer { 
            position: absolute; 
            width: 100%; 
            height: 100vh; 
            left: 0; 
            top: 0; 
            will-change: transform; 
            background-position: bottom; 
            background-repeat: no-repeat;
            background-size: auto 100%;
        }

        /* Fixed Parallax Strategy */
        .scene-layer { 
            position: absolute; 
            width: 100%; 
            height: 100vh; 
            left: 0; 
            top: 0; 
            will-change: transform; 
            background-position: bottom; 
            background-repeat: no-repeat;
            background-size: auto 100%;
        }

        /* 1. Background sky is fixed */
        .layer-0 { background-image: url('assets/parallax/Ocean/0oceanskyandsun.png'); background-size: cover; z-index: 10; }
        
        /* 2. Distant mountains move very slowly behind the sea horizon */
        .layer-4 { 
            background-image: url('assets/parallax/Ocean/4oceanbackmountain.png'); 
            z-index: 12; 
            background-size: auto 120%; 
            background-position: center bottom -100px; /* Start much lower */
        }

        /* 3. The Sea block - Everything is pinned to this to prevent gaps */
        .layer-1 { background-image: url('assets/parallax/Ocean/1oceansea.png'); z-index: 20; }
        
        /* Overlays on sea (no independent speed to prevent drift) */
        .layer-2 { background-image: url('assets/parallax/Ocean/2oceansunlight.png'); z-index: 25; mix-blend-mode: screen; opacity: 0.5; }
        .layer-3 { background-image: url('assets/parallax/Ocean/3oceanclouds.png'); z-index: 30; opacity: 0.3; filter: blur(2px); }

        /* Sand Layer - Faster than waves */
        .layer-5 { background-image: url('assets/parallax/Ocean/5oceansand.png'); z-index: 50; }

        /* Wave Layer - Slower movement to keep it low on screen */
        .layer-6 { background-image: url('assets/parallax/Ocean/6oceanwave.png'); z-index: 60; }

        /* Bottom Sand Fill - Matches requested color #DC9D90 */
        .scene-ground-fill {
            position: absolute; 
            bottom: 0;
            left: 0;
            width: 100%; 
            height: 1000vh; 
            background: #DC9D90; 
            transform: translateY(100%);
            z-index: 55;
        }

        .scene-layer.layer-6 {
            transition: opacity 0.3s ease-out;
            will-change: transform, opacity;
        }
        
        .scene-star-particle {
            position: absolute; background: white; border-radius: 50%;
            animation: scene-twinkle var(--d) ease-in-out infinite;
        }
        .scene-star-sparkle {
            position: absolute; fill: white;
            animation: scene-twinkle var(--d) ease-in-out infinite;
        }
        @keyframes scene-twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .scene-mew-container {
            position: absolute; top: 35%; left: 70%; width: 120px;
            animation: scene-mew-drift 12s ease-in-out infinite, scene-mew-bob 6s ease-in-out infinite;
        }
        /* Latias & Latios Flyby */
        .eon-duo-container {
            position: absolute;
            top: 20%;
            left: -200px;
            display: flex;
            gap: 40px;
            z-index: 35;
            animation: eon-flyby 25s linear infinite;
            animation-delay: 5s;
        }
        .eon-sprite {
            width: 80px;
            height: 80px;
            transform: scaleX(-1); /* Mirror them to face right */
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }
        @keyframes eon-flyby {
            0% { left: -300px; transform: translateY(0); }
            10% { left: 120vw; transform: translateY(-50px); }
            100% { left: 120vw; transform: translateY(-50px); }
        }
        @keyframes scene-mew-drift {
            0%, 100% { transform: translateX(-80px); }
            50% { transform: translateX(80px); }
        }
        @keyframes scene-mew-bob {
            0%, 100% { top: 35%; }
            50% { top: 40%; }
        }

        
        .scene-pokemon-gif {
            position: absolute; image-rendering: pixelated;
            filter: drop-shadow(0 0 5px rgba(255,133,162,0.3));
        }
        
        .scene-pokemon-idle { animation: scene-pkmn-bob var(--d) ease-in-out infinite; }
        @keyframes scene-pkmn-bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        /* Clouds */
        .scene-cloud {
            position: absolute; background: rgba(255, 255, 255, 0.05);
            border-radius: 50px; filter: blur(20px);
            animation: scene-cloud-drift var(--d) linear infinite;
        }
        @keyframes scene-cloud-drift {
            from { transform: translateX(-200px); }
            to { transform: translateX(100vw); }
        }
        
        .scene-orb {
            position: absolute; background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(200,255,255,0) 70%);
            border-radius: 50%; animation: scene-orb-float 10s linear infinite;
        }
        @keyframes scene-orb-float {
            0% { transform: translateY(0); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-300px); opacity: 0; }
        }

        .scene-shimmer { animation: scene-shimmer-anim 3s ease-in-out infinite; }
        @keyframes scene-shimmer-anim {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 2px rgba(100,255,255,0.3)); }
            50% { filter: brightness(1.3) drop-shadow(0 0 8px rgba(100,255,255,0.6)); }
        }
        body.theme-pokemon::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(255, 182, 193, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 182, 193, 0.1) 0%, transparent 20%);
            z-index: -2;
        }
        .parallax-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1; overflow: hidden;
            display: none;
        }
        body.theme-pokemon .parallax-bg { display: block; }
        .falling-pokemon {
            position: absolute; width: 100px; height: 100px;
            background-size: contain; background-repeat: no-repeat;
            opacity: 1; filter: drop-shadow(0 5px 15px rgba(255,133,162,0.3));
            animation: fall linear infinite;
            z-index: 70;
        }
        @keyframes fall {
            0% { transform: translateY(-420px) rotate(0deg) translateX(0); }
            100% { transform: translateY(110vh) rotate(360deg) translateX(50px); }
        }
        body.theme-pokemon .logo-text { color: #ff85a2; text-shadow: 2px 2px #ffcad4; font-family: 'Cinzel', serif; }
        body.theme-pokemon .logo-sub { color: #ff85a2; text-shadow: 1px 1px #ffcad4; }
        body.theme-pokemon .sticky-controls { background: rgba(255, 240, 243, 0.9); backdrop-filter: blur(10px); border-bottom: 2px solid #ffcad4; box-shadow: 0 4px 15px rgba(255, 133, 162, 0.1); }
        body.theme-pokemon .tab-btn { background: #fff; border-color: #ffcad4; color: #ff85a2; }
        body.theme-pokemon .tab-btn.active { background: #ff85a2; color: #fff; border-color: #ff85a2; font-weight: bold; box-shadow: 0 0 15px rgba(255, 133, 162, 0.3); }
        body.theme-pokemon .section-title { border-bottom: 2px solid #ff85a2; color: #ff85a2; text-transform: uppercase; letter-spacing: 2px; }
        body.theme-pokemon .calc-summary-bar { background: #ffffff; border: 1px solid #ffcad4; color: #4a4a4a; box-shadow: 0 8px 25px rgba(255, 133, 162, 0.1); }
        body.theme-pokemon .card { border-width: 2px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2); }
        body.theme-pokemon .card:hover { transform: translateY(-15px) scale(1.12); box-shadow: 0 15px 35px rgba(255, 133, 162, 0.3); }
        body.theme-pokemon .search-input, body.theme-pokemon .select-input { border: 1px solid #ffcad4; background: #fff; color: #4a4a4a; }
        body.theme-pokemon #loadingOverlay { background: rgba(255, 240, 243, 0.9); }

        .comp-card img { width: 100%; border-radius: 4px; aspect-ratio: 0.73; object-fit: cover; }
        .comp-card.missing img { filter: grayscale(1) brightness(0.3); }


        .sheen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 1; opacity: 0; transition: opacity 0.3s; }
        .card:hover .sheen { opacity: 1; }
        .sheen-reverse { background: linear-gradient(110deg, transparent 40%, rgba(255,255,255,0.4) 50%, transparent 60%); background-size: 200% 200%; animation: sweep 3s infinite linear; }
        .sheen-holo { background: linear-gradient(135deg, transparent 40%, rgba(255,215,0,0.4) 50%, transparent 60%); background-size: 200% 200%; animation: sweep 2.5s infinite linear; }
        .sheen-ex { background: radial-gradient(circle at center, rgba(79,195,247,0.1) 0%, transparent 70%); }
        .card:hover .sheen-ex { animation: pulse 2s infinite ease-in-out; }
        .sheen-ex::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(105deg, transparent 45%, rgba(255,255,255,0.4) 50%, transparent 55%); background-size: 200% 200%; animation: sweep 2s infinite linear; }
        .sheen-ultra { background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.7) 50%, transparent 70%); background-size: 250% 250%; animation: sweep 1.5s infinite linear; mix-blend-mode: overlay; }
        .sheen-ir { background: linear-gradient(45deg, rgba(255,0,0,0.1), rgba(0,255,0,0.1), rgba(0,0,255,0.1)); animation: rainbow 5s infinite linear; }
        .sheen-ir::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(105deg, transparent 45%, rgba(255,255,255,0.3) 50%, transparent 55%); background-size: 200% 200%; animation: sweep 3s infinite linear; }
        .sheen-sir { background: linear-gradient(135deg, rgba(255,0,0,0.2), rgba(0,255,0,0.2), rgba(0,0,255,0.2)); background-size: 400% 400%; animation: cosmic 4s infinite linear; }
        .sheen-sir::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.6) 50%, transparent 60%); background-size: 200% 200%; animation: sweep 2s infinite linear; mix-blend-mode: color-dodge; }
        .sheen-mhr { background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 255, 255, 0.3), rgba(255, 215, 0, 0.2)); background-size: 200% 200%; }
        .card:hover .sheen-mhr { animation: sweep 2s infinite linear; }
        .sheen-mhr::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(105deg, transparent 20%, rgba(255, 255, 255, 0.6) 50%, transparent 80%); background-size: 200% 200%; animation: sweep 1.5s infinite linear; mix-blend-mode: overlay; }
        @keyframes sweep { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
        @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        /* Loading Overlay */

        .grid.binder-view {

        .logo-sub {

        .tutorial-btn { background: none; border: 1px solid var(--accent); color: var(--accent); border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .auth-btn { background: var(--accent); color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.7em; cursor: pointer; }

        @media (max-width: 800px) {

    <script>
        var partnerCollection = null;
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:3001' 
            : window.location.origin;
        let loggedInUser = localStorage.getItem('por_user') || null;
        let authMode = 'login';
        
        // New Global State
        const currencies = { 
            AUD: { symbol: 'A$', rate: 1 }, 
            USD: { symbol: '$', rate: 0.65 }, 
            EUR: { symbol: '€', rate: 0.61 }, 
            GBP: { symbol: '£', rate: 0.51 } 
        };
        let currentCurrency = localStorage.getItem('por_currency') || 'AUD';
        let viewMode = localStorage.getItem('por_view_mode') || 'grid';

        const currentSet = localStorage.getItem('por_current_set') || 'po';
        
        // Public Profile Check
        const urlParams = new URLSearchParams(window.location.search);
        const publicUser = urlParams.get('u');
        let isReadOnly = !!publicUser;
        if (isReadOnly) {
            loggedInUser = publicUser;
        }

        if (!localStorage.getItem('por_prices_po') && localStorage.getItem('por_prices')) {
            localStorage.setItem('por_prices_po', localStorage.getItem('por_prices'));
        }
        if (!localStorage.getItem('por_qty_po') && localStorage.getItem('por_qty')) {
            localStorage.setItem('por_qty_po', localStorage.getItem('por_qty'));
        }
        document.addEventListener('DOMContentLoaded', () => { 
            if(document.getElementById('setSelect')) document.getElementById('setSelect').value = currentSet; 
            const savedTheme = localStorage.getItem('por_theme') || 'articuno-ice';
            setTheme(savedTheme);
            if (savedTheme === 'pokemon') initPokemonTheme();
            updateUserUI();
            initData();
        });

        function setTheme(theme) {
            document.body.classList.remove('theme-light', 'theme-pokemon', 'theme-mew-nighttime', 'theme-articuno-ice');
            if (theme !== 'dark') {
                document.body.classList.add('theme-' + theme);
            }
            localStorage.setItem('por_theme', theme);
            
            // Clean up both background systems
            const sceneBg = document.getElementById('scene-background');
            const iceBg = document.getElementById('ice-background');
            const parallaxBg = document.getElementById('parallaxBg');
            
            if (sceneBg) sceneBg.style.display = 'none';
            if (iceBg) iceBg.style.display = 'none';
            if (parallaxBg) parallaxBg.style.display = 'none';

            if (theme === 'pokemon') {
                if (parallaxBg) parallaxBg.style.display = 'block';
                initPokemonTheme();
            }
            if (theme === 'mew-nighttime') {
                if (sceneBg) sceneBg.style.display = 'block';
                initMewNighttime();
            }
            if (theme === 'articuno-ice') {
                if (iceBg) iceBg.style.display = 'block';
                initArticunoIce();
            }
        }

        window.addEventListener('click', (e) => {
            const tabs = document.querySelector('.nav-tabs');
            const sticky = document.querySelector('.sticky-controls');
            const btn = document.querySelector('.hamburger-btn');
            
            if (tabs && tabs.classList.contains('mobile-active')) {
                // If click is outside sticky controls OR is a tab-btn inside
                if (!sticky.contains(e.target) || e.target.classList.contains('tab-btn')) {
                    // Slight delay for click feedback before closing if it's a button
                    if (e.target.classList.contains('tab-btn')) {
                        setTimeout(toggleMobileMenu, 150);
                    } else {
                        toggleMobileMenu();
                    }
                }
            }
        });

        function toggleMobileMenu() {
            const tabs = document.querySelector('.nav-tabs');
            tabs.classList.toggle('mobile-active');
            
            const btn = document.querySelector('.hamburger-btn');
            const isOpened = tabs.classList.contains('mobile-active');
            btn.innerText = isOpened ? '✕' : '☰';
            
            // Adjust overlay z-index if menu is open
            document.querySelector('.sticky-controls').style.zIndex = isOpened ? "10000" : "1000";
        }

        // Auto-close menu on tab switch
        const originalSwitchView = window.switchView;
        window.switchView = async function(v) {
            if (window.innerWidth <= 800) {
                const tabs = document.querySelector('.nav-tabs');
                if (tabs && tabs.classList.contains('mobile-active')) {
                    toggleMobileMenu(); // Gracefully close
                }
            }
            await originalSwitchView(v);
        };

        function initArticunoIce() {
            // Placeholder for theme-specific JS initialization if needed
        }

        function initMewNighttime() {
            const starLayer = document.getElementById('scene-stars');
            if (starLayer && !starLayer.children.length) {
                // Increased density for longer page
                for (let i = 0; i < 150; i++) {
                    const isSparkle = Math.random() > 0.7;
                    const el = document.createElementNS("http://www.w3.org/2000/svg", isSparkle ? "svg" : "div");
                    const x = Math.random() * 100;
                    const y = Math.random() * 200; // Extend starfield height
                    const dur = (Math.random() * 3 + 2) + "s";
                    const del = (Math.random() * 10) + "s";

                    if (isSparkle) {
                        el.setAttribute("class", "scene-star-sparkle");
                        el.setAttribute("viewBox", "0 0 20 20");
                        el.style.width = "10px";
                        el.style.height = "10px";
                        el.innerHTML = '<path d="M10 0 L12 8 L20 10 L12 12 L10 20 L8 12 L0 10 L8 8 Z" />';
                    } else {
                        el.className = "scene-star-particle";
                        el.style.width = (Math.random() * 3 + 1) + "px";
                        el.style.height = el.style.width;
                    }
                    el.style.left = x + "%";
                    el.style.top = y + "%";
                    el.style.setProperty("--d", dur);
                    el.style.animationDelay = del;
                    starLayer.appendChild(el);
                }
            }

            const grassGroup = document.getElementById('scene-grass-group');
            if (grassGroup && !grassGroup.children.length) {
                for (let i = 0; i < 40; i++) {
                    const x = Math.random() * 1000;
                    const h = Math.random() * 25 + 15;
                    const rect = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    const shimmer = Math.random() > 0.6 ? " scene-shimmer" : "";
                    rect.setAttribute("class", "scene-grass-tuft" + shimmer);
                    rect.setAttribute("d", `M${x} 320 Q${x + 5} ${320 - h}, ${x + 10} 320`);
                    rect.setAttribute("fill", i % 2 === 0 ? "#1a4d2e" : "#0f2c1a");
                    rect.setAttribute("stroke", "#2d5a3b");
                    rect.setAttribute("stroke-width", "1");
                    grassGroup.appendChild(rect);
                }
            }
            
            const cloudLayer = document.getElementById('scene-clouds');
            if (cloudLayer && !cloudLayer.children.length) {
                for (let i = 0; i < 6; i++) {
                    const cloud = document.createElement('div');
                    cloud.className = 'scene-cloud';
                    cloud.style.width = (Math.random() * 200 + 150) + 'px';
                    cloud.style.height = (Math.random() * 40 + 30) + 'px';
                    cloud.style.top = (Math.random() * 40 + 10) + '%';
                    cloud.style.left = (Math.random() * 100) + '%';
                    cloud.style.setProperty('--d', (Math.random() * 40 + 40) + 's');
                    cloud.style.animationDelay = (Math.random() * -60) + 's';
                    cloudLayer.appendChild(cloud);
                }
            }
        }

        // Parallax Scroll Handler
        let scrollY = 0;
        let ticking = false;

        function updateParallax() {
            const layers = document.querySelectorAll('.scene-layer[data-speed], .ice-layer[data-speed]');
            const waveLayer = document.querySelector('.layer-6');
            
            layers.forEach(layer => {
                const speed = parseFloat(layer.getAttribute('data-speed'));
                const yPos = -(scrollY * speed);
                layer.style.transform = `translateY(${yPos}px)`;
            });

            // Fade out waves rapidly when scrolling down
            if (waveLayer) {
                // Fades out completely by 400px of scroll
                const opacity = Math.max(0, 1 - (scrollY / 400));
                waveLayer.style.opacity = opacity;
            }

            ticking = false;
        }

        window.addEventListener('scroll', () => {
            scrollY = window.pageYOffset;
            if (!ticking) {
                window.requestAnimationFrame(updateParallax);
                ticking = true;
            }
        });

        function initPokemonTheme() {
            const bg = document.getElementById('parallaxBg');
            if (!bg) return;
            bg.innerHTML = '';
            
            // 1. Twinkling Stars (Behind)
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star shining-star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.setProperty('--duration', (Math.random() * 3 + 1.5) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                
                const starSize = Math.random() * 4 + 3;
                star.style.width = starSize + 'px';
                star.style.height = starSize + 'px';
                bg.appendChild(star);
            }

            // 2. Shooting Stars (Behind)
            for (let i = 0; i < 3; i++) {
                const star = document.createElement('div');
                star.className = 'star shooting-star';
                star.style.left = (Math.random() * 50) + 'vw';
                star.style.top = (Math.random() * 50) + 'vh';
                star.style.setProperty('--duration', (Math.random() * 2 + 3) + 's');
                star.style.animationDelay = (Math.random() * 15) + 's';
                bg.appendChild(star);
            }

            // 3. Falling Cute Pokemon (In Front of Stars)
            const pinkPokemon = [
                'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/151.png', // Mew

        async function fetchBulkPrices(cardIds) {
            if (!cardIds.length) return;
            try {
                const prefix = currentSet === 'po' ? 'POR-' : 'sv3pt5-';
                const tcgids = cardIds.map(id => prefix + id).join(',');
                const r = await fetch('https://pokemon-tcg-api.p.rapidapi.com/cards?tcgids=' + encodeURIComponent(tcgids), { 
                    headers: {'x-rapidapi-host': 'pokemon-tcg-api.p.rapidapi.com', 'x-rapidapi-key': KEY}
                });
                if (!r.ok) return;
                const j = await r.json();
                if (j.data) {
                    j.data.forEach(m => {
                        const id = m.tcgid?.replace(prefix, '');
                        const matches = DATA.filter(d => d.id == id);
                        matches.forEach(d => {
                            const k = d.name + d.rarity + d.variant;
                            let eur = m?.prices?.cardmarket?.lowest_near_mint || m?.prices?.cardmarket?.['30d_average'];
                            if (eur) {
                                prices[k] = (parseFloat(eur) * 1.65).toFixed(2);
                            }
                        });
                    });
                    savePrices();
                }
            } catch(e) { console.warn("Bulk fetch failed", e); }
        }

        function savePrices() {

            filtered.forEach(d => delete prices[d.name + d.rarity + d.variant]);

        let isRefreshing = false;
        window.handleRefresh = async function() {
            if (isRefreshing) return;
            isRefreshing = true;

            // Update Progress Ring
            updateProgressRing();

            const loader = document.getElementById('loadingOverlay');
            const query = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('typeSelect').value;
            const stageFilter = document.getElementById('stageSelect').value;
            
            const needsFetch = DATA.some(d => (view === 'collection' ? d.owned > 0 : (view === 'missing' ? d.owned === 0 : false)) && !prices[d.name + d.rarity + d.variant]);
            const showLoader = (view === 'missing' || view === 'collection' || view === 'calc') && (needsFetch || !query);
            
            if (showLoader) {
                loader.style.display = 'flex';
                await new Promise(r => setTimeout(r, 100));
            }

            try {
                const sort = document.getElementById('sortSelect').value;
                const shade = document.getElementById('shadeToggle').checked;
                const container = document.getElementById('content');
                
                // Show/Hide advanced filters
                const hasFilters = currentSet === 'po' || currentSet === '151'; // Enable for both
                document.getElementById('typeSelect').style.display = hasFilters ? 'block' : 'none';
                document.getElementById('stageSelect').style.display = hasFilters ? 'block' : 'none';

                let isCalc = view === 'calc';

                if (view === 'dashboard') {
                    renderDashboard();
                    return;
                }

                let filtered = DATA;
                if (view === 'missing') filtered = DATA.filter(d => d.owned === 0);
                else if (view === 'trade') filtered = DATA;
                else if (isCalc) filtered = DATA;

                if (query) filtered = filtered.filter(d => d.name.toLowerCase().includes(query) || d.rarity.toLowerCase().includes(query) || d.id.toString().includes(query));
                
                // Advanced Filters
                if (typeFilter) filtered = filtered.filter(d => d.type && d.type.includes(typeFilter));
                if (stageFilter) {
                    if (stageFilter === 'V') filtered = filtered.filter(d => d.name.includes(' ex') || d.name.includes(' V'));
                    else filtered = filtered.filter(d => d.stage === stageFilter);
                }

                filtered.sort((a, b) => {
                    if (sort === 'rarity') return b.rarity_rank - a.rarity_rank || a.id - b.id;
                    if (sort === 'number') return a.id - b.id;
                    if (sort === 'pokedex') return a.dex_id - b.dex_id;
                    return a.name.localeCompare(b.name);
                });

                if (isCalc) {
                    await renderCalcWrapper(filtered);
                    return;
                }

                if (view === 'import') {
                    renderImport();
                    return;
                }

                // Check for uncached prices in the current view
                if (view === 'missing' || view === 'collection') {
                    const uncachedIds = [...new Set(filtered.filter(d => (view === 'collection' ? d.owned > 0 : (view === 'missing' ? true : false)) && !prices[d.name + d.rarity + d.variant]).map(d => d.id))];
                    if (uncachedIds.length > 0) {
                        for (let i = 0; i < uncachedIds.length; i += 20) {
                            await fetchBulkPrices(uncachedIds.slice(i, i + 20));
                        }
                    }
                }

                let html = "", groups = {};
                
                if (view === 'missing' || view === 'collection') {
                    let totalVal = 0;
                    // For collection, we always show the total of ALL owned cards, not just filtered ones
                    const priceTarget = view === 'collection' ? DATA.filter(d => d.owned > 0) : filtered;
                    for (const d of priceTarget) {
                        const k = d.name + d.rarity + d.variant;
                        const p = prices[k] || ({0:0.25, 1:0.50, 2:1.00, 5:5.00, 6:15.00, 7:20.00, 8:40.00, 9:80.00}[d.rarity_rank] || 1.00);
                        totalVal += parseFloat(p) * (view === 'collection' ? d.owned : 1);
                    }
                    
                    const c = currencies[currentCurrency];
                    const convertedVal = (totalVal * c.rate).toFixed(2);

                    html += `<div class="calc-summary-bar" style="margin-bottom: 20px; flex-direction: column; gap: 12px;">
                                <div class="calc-total-box">
                                    <div class="label">Total ${view === 'collection' ? 'Collection' : 'Missing'} Value (${currentCurrency})</div>
                                    <div class="value ${view === 'collection' ? 'collection' : 'missing'}">${c.symbol}${convertedVal}</div>
                                    <div style="font-size:0.5em; color:#666; margin-top:5px;">Using bulk market data + rarity estimates</div>
                                </div>
                                <button class="tab-btn" style="background:rgba(0,0,0,0.2); font-size:0.7em; padding: 5px 15px;" onclick="reevaluatePrices()">↻ Re-evaluate Prices</button>
                             </div>`;
                }

                filtered.forEach(d => {
                    let k = sort === 'rarity' ? d.rarity : (sort === 'name' ? d.name[0].toUpperCase() : "Cards");
                    if (!groups[k]) groups[k] = []; groups[k].push(d);
                });

                Object.keys(groups).forEach(k => {
                    html += '<div class="section-title">' + k + ' (' + groups[k].length + ')</div>';
                    html += `<div class="grid ${viewMode === 'binder' ? 'binder-view' : ''}">`;
                    html += groups[k].map(d => window.renderCard(d, false, shade)).join('');
                    html += '</div>';
                });
                container.innerHTML = html;
            } finally {
                isRefreshing = false;
                loader.style.display = 'none';
            }
        };

        window.updateQty = async function(delta) {
            if (!currentModalCard) return;
            // Prevent modifying partner's or public profile's quantities
            if (isPartnerModal || isReadOnly) {
                alert(isReadOnly ? "Viewing public profile - cannot edit." : "Cannot edit partner's collection quantities.");
                return;
            }
            currentModalCard.owned = Math.max(0, currentModalCard.owned + delta);
            document.getElementById('modalQty').innerText = currentModalCard.owned;
            
            // Local state update
            const localOverrides = JSON.parse(localStorage.getItem('por_qty_' + currentSet) || '{}');
            localOverrides[currentModalCard.uid] = currentModalCard.owned;
            localStorage.setItem('por_qty_' + currentSet, JSON.stringify(localOverrides));
            
            // Sync to cloud if logged in
            if (loggedInUser) {
                try {
                    // Fetch existing data first to merge sets
                    const r = await fetch(`${API_URL}/get-data?username=${loggedInUser}`);
                    let allData = {};
                    if (r.ok) allData = await r.json();
                    
                    // Update only this set's data in the cloud structure
                    allData[currentSet] = localOverrides;

                    await fetch(`${API_URL}/save-data`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: loggedInUser, data: allData })
                    });
                } catch (e) { console.warn("Cloud sync failed", e); }
            }
            
            window.handleRefresh();
        };

            const errorEl = document.getElementById('authError');

                });

                const j = await r.json();
                if (!r.ok) {
                    errorEl.innerText = j.error || "Authentication failed.";
                    errorEl.style.display = 'block';
                } else {
                    loggedInUser = username;
                    localStorage.setItem('por_user', username);

                    usernameInput.value = '';

                    closeAuthModal();
                    updateUserUI();

        window.handleExcelImport = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            const status = document.getElementById('importStatus');
            status.style.display = 'block';
            status.innerText = "Reading file...";
            status.style.color = "#66bb6a";

            reader.onload = async function(evt) {
                try {
                    const data = new Uint8Array(evt.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    let totalImported = 0;

                    const setMappings = [
                        { name: 'po', sheetKeywords: ['Perfect Order'], data: window.CARD_DATA },
                        { name: '151', sheetKeywords: ['151'], data: window.DATA_151 }
                    ];

                    for (const mapping of setMappings) {
                        const sheetName = workbook.SheetNames.find(s => 
                            mapping.sheetKeywords.some(k => s.toLowerCase().includes(k.toLowerCase()))
                        );

                        if (sheetName) {
                            console.log("Found sheet:", sheetName, "for set:", mapping.name);
                            const sheet = workbook.Sheets[sheetName];
                            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                            const localOverrides = JSON.parse(localStorage.getItem('por_qty_' + mapping.name) || '{}');

                            rows.forEach(row => {
                                const name = row[0];
                                const num = row[2];
                                if (!name || num === undefined) return;

                                // Match cards in this set
                                mapping.data.forEach(card => {
                                    // Match by number and name (allowing for minor differences)
                                    if (card.id == num && (name.toString().toLowerCase().includes(card.name.toLowerCase()))) {
                                        let qty = 0;
                                        if (card.variant === 'Standard' || card.variant === 'Non-Holo') qty = parseInt(row[15]) || 0;
                                        else if (card.variant === 'Reverse Holo') qty = parseInt(row[16]) || 0;
                                        else if (card.variant === 'Holo Rare') qty = parseInt(row[17]) || 0;

                                        if (qty > 0) {
                                            card.owned = qty;
                                            localOverrides[card.uid] = qty;
                                            totalImported++;
                                        }
                                    }
                                });
                            });

                            localStorage.setItem('por_qty_' + mapping.name, JSON.stringify(localOverrides));
                        }
                    }

                    status.innerText = `✅ Success! Imported ${totalImported} cards across detected sets.`;
                    
                    // Sync to cloud if logged in
                    if (loggedInUser) {
                        status.innerText += " Syncing to cloud...";
                        try {
                            const r = await fetch(`${API_URL}/get-data?username=${loggedInUser}`);
                            let allData = {};
                            if (r.ok) allData = await r.json();
                            
                            setMappings.forEach(m => {
                                allData[m.name] = JSON.parse(localStorage.getItem('por_qty_' + m.name) || '{}');
                            });

                            await fetch(`${API_URL}/save-data`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ username: loggedInUser, data: allData })
                            });
                            status.innerText = `✅ Success! Imported ${totalImported} cards and synced to cloud.`;
                        } catch (cloudErr) {
                            console.error("Cloud sync failed during import:", cloudErr);
                            status.innerText += " (Cloud sync failed, data saved locally)";
                        }
                    }

                    setTimeout(() => {
                        window.handleRefresh();
                    }, 1500);

                } catch (err) {
                    console.error("Import error:", err);
                    status.innerText = "❌ Error: Could not parse Excel file. Make sure it's a valid checklist.";
                    status.style.color = "#ef5350";
                }
            };
            reader.onerror = function() {
                status.innerText = "❌ Error: Could not read file.";
                status.style.color = "#ef5350";
            };
            reader.readAsArrayBuffer(file);
        };

        function toggle(d, l) {
            const i = l.findIndex(x => x.uid === d.uid);
            if (i > -1) { l.splice(i, 1); return false; } 
            else { l.push(d); return true; }
        }

        async function getP(d) {
            const k = d.name + d.rarity + d.variant;
            if (prices[k]) return prices[k];
            
            const est = {0:0.25, 1:0.50, 2:1.00, 5:5.00, 6:15.00, 7:20.00, 8:40.00, 9:80.00}[d.rarity_rank] || 1.00;
            
            try {
                const prefix = currentSet === 'po' ? 'POR-' : 'sv3pt5-';
                const tcgid = prefix + d.id;
                const r = await fetch('https://pokemon-tcg-api.p.rapidapi.com/cards?tcgid=' + encodeURIComponent(tcgid), { 
                    headers: {'x-rapidapi-host': 'pokemon-tcg-api.p.rapidapi.com', 'x-rapidapi-key': KEY}
                });
                if (!r.ok) throw new Error(r.status);
                const j = await r.json();
                const m = j.data?.[0];
                let eur = m?.prices?.cardmarket?.lowest_near_mint || m?.prices?.cardmarket?.['30d_average'] || est;
                let aud = (parseFloat(eur) * 1.65).toFixed(2);
                prices[k] = aud;
                savePrices(); 
                return prices[k];
            } catch(e) { 
                return est.toFixed(2); 
            }
        }

        async function updateP() {
            let tt = 0, mt = 0;
            
            for (const d of trade) { 
                const p = await getP(d); 
                tt += parseFloat(p); 
            }
            for (const d of want) { 
                const p = await getP(d); 
                mt += parseFloat(p); 
            }
            
            const diff = (tt - mt).toFixed(2);
            const fD = document.getElementById('fD');
            
            if (fD) {
                fD.innerText = (diff >= 0 ? '+' : '-') + 'A$' + Math.abs(diff).toFixed(2);
                fD.style.color = diff >= 0 ? '#66bb6a' : '#ef5350';
            }
            
            if (document.getElementById('tT')) document.getElementById('tT').innerText = 'A$' + tt.toFixed(2);
            if (document.getElementById('mT')) document.getElementById('mT').innerText = 'A$' + mt.toFixed(2);
            if (document.getElementById('tradeCount')) document.getElementById('tradeCount').innerText = trade.length;
            if (document.getElementById('wantCount')) document.getElementById('wantCount').innerText = want.length;
        }

        function getB(d) {
            const r = d.rarity.toLowerCase();
            if (r.includes('hyper')) return 'rarity-mhr';
            if (r.includes('special')) return 'rarity-sir';
            if (r.includes('ultra')) return 'rarity-ultra';
            if (r.includes('double') || r.includes('ex')) return 'rarity-ex';
            if (d.variant === 'Reverse Holo') return 'variant-reverse';
            if (d.variant === 'Holo Rare') return 'variant-holo';
            return '';
        }

        function getS(d) {
            const r = d.rarity.toLowerCase();
            if (r.includes('hyper')) return 'sheen-mhr';
            if (r.includes('special')) return 'sheen-sir';
            if (r.includes('illustration')) return 'sheen-ir';
            if (r.includes('ultra')) return 'sheen-ultra';
            if (r.includes('double') || r.includes('ex')) return 'sheen-ex';
            if (d.variant === 'Holo Rare') return 'sheen-holo';
            if (d.variant === 'Reverse Holo') return 'sheen-reverse';
            return '';
        }

            if (label) label.innerText = viewMode === 'grid' ? '📖' : '🖼️';
            if (text) text.innerText = viewMode === 'grid' ? 'Enable Binder View' : 'Disable Binder View';
            
            window.handleRefresh();
        }

        function updateProgressRing() {
            const ownedCount = DATA.filter(d => d.owned > 0).length;
            const totalCount = DATA.length;
            const percent = Math.round((ownedCount / totalCount) * 100);
            
            const ring = document.getElementById('progressRing');
            const txt = document.getElementById('progressPercent');
            const txtMain = document.getElementById('completion-text');
            const txtMobile = document.getElementById('completion-text-mobile');
            
            if (ring && txt) {
                const offset = 88 - (88 * (percent / 100));
                ring.style.strokeDashoffset = offset;
                txt.innerText = percent + '%';
            }

            if (txtMain) txtMain.innerText = percent + '%';
            if (txtMobile) txtMobile.innerText = percent + '%';
        }

        function renderDashboard() {
            const container = document.getElementById('content');
            const owned = DATA.filter(d => d.owned > 0);
            const c = currencies[currentCurrency];
            
            const shareBtn = (loggedInUser && !isReadOnly) ? `
                <button class="tab-btn" style="background: var(--accent); color: white; border: none; font-size: 0.7em; margin-top: 10px;" onclick="copyShareLink()">
                    🔗 Copy Public Share Link
                </button>
            ` : '';

            const rarityCounts = {};
            owned.forEach(d => {
                rarityCounts[d.rarity] = (rarityCounts[d.rarity] || 0) + 1;
            });
            
            const totalVal = owned.reduce((sum, d) => {
                const p = prices[d.name + d.rarity + d.variant] || ({0:0.25, 1:0.50, 2:1.00, 5:5.00, 6:15.00, 7:20.00, 8:40.00, 9:80.00}[d.rarity_rank] || 1.00);
                return sum + (parseFloat(p) * d.owned);
            }, 0);

            // Master Set Progress (Cards with at least 1 of each variant)
            const masterNames = [...new Set(DATA.map(d => d.name))];
            let masteredCount = 0;
            masterNames.forEach(name => {
                const variants = DATA.filter(d => d.name === name);
                if (variants.every(v => v.owned > 0)) masteredCount++;
            });

            const topCards = [...owned].sort((a,b) => {
                const pa = prices[a.name + a.rarity + a.variant] || 0;
                const pb = prices[b.name + b.rarity + b.variant] || 0;
                return pb - pa;
            }).slice(0, 5);

            container.innerHTML = `
                <div style="text-align: center; margin-bottom: 30px;">
                    <div style="font-family: 'Cinzel'; font-size: 1.5em; color: #fff;">${loggedInUser}'s Stats</div>
                    ${shareBtn}
                </div>
                <div class="pulse-grid">
                    <div class="pulse-card">
                        <div class="lbl">Total Value</div>
                        <div class="val">${c.symbol}${(totalVal * c.rate).toLocaleString()}</div>
                    </div>
                    <div class="pulse-card">
                        <div class="lbl">Unique Cards</div>
                        <div class="val">${owned.length} / ${DATA.length}</div>
                    </div>
                    <div class="pulse-card">
                        <div class="lbl">Mastery</div>
                        <div class="val">${Math.round((owned.length / DATA.length)*100)}%</div>
                    </div>
                    <div class="pulse-card">
                        <div class="lbl">Master Set Progress</div>
                        <div class="val">${masteredCount} / ${masterNames.length}</div>
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                    <div class="pulse-card" style="text-align: left;">
                        <div class="lbl" style="margin-bottom: 15px;">💎 Top Value Cards</div>
                        <div class="top-cards-list">
                            ${topCards.map(d => `
                                <div class="top-card-item">
                                    <img src="${d.image}" class="top-card-img">
                                    <div style="flex: 1;">
                                        <div style="font-size: 0.8em; font-weight: bold;">${d.name}</div>
                                        <div style="font-size: 0.6em; color: #888;">${d.rarity}</div>
                                    </div>
                                    <div style="color: var(--accent); font-weight: bold;">${c.symbol}${((prices[d.name + d.rarity + d.variant] || 0) * c.rate).toFixed(2)}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="pulse-card" style="text-align: left;">
                        <div class="lbl" style="margin-bottom: 15px;">📊 Rarity Distribution</div>
                        <div style="display: flex; flex-direction: column; gap: 8px;">
                            ${Object.entries(rarityCounts).sort((a,b) => b[1] - a[1]).map(([r, count]) => `
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <div style="font-size: 0.7em; width: 100px; color: #888;">${r}</div>
                                    <div style="flex: 1; height: 8px; background: #222; border-radius: 4px; overflow: hidden;">
                                        <div style="width: ${(count/owned.length)*100}%; height: 100%; background: var(--accent);"></div>
                                    </div>
                                    <div style="font-size: 0.7em; color: #fff;">${count}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function copyShareLink() {
            const url = window.location.origin + window.location.pathname + "?u=" + loggedInUser;
            navigator.clipboard.writeText(url).then(() => {
                alert("Public link copied to clipboard!\n\n" + url);
            });
        }
        
        let currentTutorialStep = 0;
        const tutorialSteps = [
            {
                title: "Welcome, Trainer!",
                content: "Noble Poketrades is your ultimate companion for tracking Pokémon TCG collections and balancing trades with live market data.",
                target: null
            },
            {
                title: "Switch Sets",
                content: "Easily jump between 'Perfect Order' and 'Scarlet & Violet 151' to manage different parts of your collection.",
                target: ".nav-tabs .tab-btn[onclick*='openSetSelect']"
            },
            {
                title: "Navigation",
                content: "View your current collection, see what's missing, or head to the Calculator to plan your next trade.",
                target: ".nav-tabs > div:first-child"
            },
            {
                title: "Find Your Favorites",
                content: "Use the search bar to filter by name, number, or rarity. Sort your cards to organize your view.",
                target: ".search-sort-bar"
            },
            {
                title: "Quick Collection",
                content: "<b>Pro Tip:</b> Tap any card in the grid to open the manager. You can adjust quantities and see live market prices!",
                target: ".grid .card:first-child"
            },
            {
                title: "Export & Share",
                content: "Generate a beautiful PDF report of your missing cards to share with trading partners or keep for your records.",
                target: "#exportBtn"
            },
            {
                title: "You're All Set!",
                content: "Start building your dream collection today. If you have an Excel checklist, don't forget the 'Import' tab!",
                target: null
            }
        ];

        window.startTutorial = function() {
            currentTutorialStep = 0;
            document.getElementById('tutorial-overlay').style.display = 'block';
            
            // Create dots
            const dotContainer = document.getElementById('tutorial-dots');
            dotContainer.innerHTML = tutorialSteps.map((_, i) => `<div class="tutorial-dot ${i === 0 ? 'active' : ''}"></div>`).join('');
            
            window.addEventListener('resize', updateTutorialUI);
            updateTutorialUI();
        };

        window.nextTutorialStep = function() {
            currentTutorialStep++;
            if (currentTutorialStep >= tutorialSteps.length) {
                finishTutorial();
            } else {
                updateTutorialUI();
            }
        };

        function updateTutorialUI() {
            const step = tutorialSteps[currentTutorialStep];
            if (!step) return;

            // If menu is closed and target is inside nav-tabs (mobile only), open menu
            if (window.innerWidth <= 800 && step.target && step.target.includes('.nav-tabs')) {
                const tabs = document.querySelector('.nav-tabs');
                if (tabs && !tabs.classList.contains('mobile-active')) {
                    toggleMobileMenu();
                    // Wait for layout shift then recalculate
                    setTimeout(updateTutorialUI, 300);
                    return;
                }
            }

            document.getElementById('tutorial-title').innerText = step.title;
            document.getElementById('tutorial-content').innerHTML = step.content;
            document.getElementById('tutorial-next').innerText = currentTutorialStep === tutorialSteps.length - 1 ? "Start Building!" : "Next Step";

            // Update dots
            document.querySelectorAll('.tutorial-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentTutorialStep);
            });

            const maskPath = document.getElementById('mask-path');
            const highlight = document.getElementById('tutorial-highlight');
            const card = document.getElementById('tutorial-card');

            const w = window.innerWidth;
            const h = window.innerHeight;

            if (step.target) {
                const targetEl = document.querySelector(step.target);
                if (targetEl) {
                    targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    
                    setTimeout(() => {
                        const rect = targetEl.getBoundingClientRect();
                        const padding = 12;
                        const x = rect.left - padding;
                        const y = rect.top - padding;
                        const rw = rect.width + (padding * 2);
                        const rh = rect.height + (padding * 2);
                        const radius = 15;

                        // Create hole path for the mask (Black cuts through white)
                        // Rounded rectangle hole: Ensure all math result in absolute numbers
                        const rx = Math.round(x);
                        const ry = Math.round(y);
                        const rw_r = Math.round(rw);
                        const rh_r = Math.round(rh);
                        const r_rad = Math.round(radius);
                        
                        const d = `M ${rx + r_rad} ${ry} h ${rw_r - r_rad * 2} a ${r_rad},${r_rad} 0 0 1 ${r_rad},${r_rad} v ${rh_r - r_rad * 2} a ${r_rad},${r_rad} 0 0 1 -${r_rad},${r_rad} h -${rw_r - r_rad * 2} a ${r_rad},${r_rad} 0 0 1 -${r_rad},-${r_rad} v -${rh_r - r_rad * 2} a ${r_rad},${r_rad} 0 0 1 ${r_rad},-${r_rad} z`;
                        
                        maskPath.setAttribute('d', d);

                        highlight.style.display = 'block';
                        highlight.style.left = x + 'px';
                        highlight.style.top = y + 'px';
                        highlight.style.width = rw + 'px';
                        highlight.style.height = rh + 'px';

                        // Position card
                        const cardRect = card.getBoundingClientRect();
                        if (y > h / 2) {
                            card.style.top = Math.max(cardRect.height / 2 + 20, y - cardRect.height / 2 - 40) + 'px';
                        } else {
                            card.style.top = Math.min(h - cardRect.height / 2 - 20, y + rh + cardRect.height / 2 + 40) + 'px';
                        }
                    }, 300);
                }
            } else {
                maskPath.setAttribute('d', '');
                highlight.style.display = 'none';
                card.style.top = '50%';
            }
        }

        window.finishTutorial = function() {
            document.getElementById('tutorial-overlay').style.display = 'none';
            document.getElementById('tutorial-highlight').style.display = 'none';
            localStorage.setItem('por_tutorial_done', 'true');
            window.removeEventListener('resize', updateTutorialUI);
        };

        // Trigger on first load
        if (!localStorage.getItem('por_tutorial_done')) {
            setTimeout(startTutorial, 1500);
        }
    </script>
</body>
</html>
